n  \"baanc.diagnostics.enabled\": true,\n  \"baanc.diagnostics.namingConventions\": true,\n  \"baanc.diagnostics.namingArgPrefixes\": false,\n  \"baanc.completion.includeBuiltins\": true,\n  \"baanc.completion.includeErrors\": true,\n  \"baanc.libraryMemory.enabled\": true,\n  \"baanc.libraryMemory.autoImportOnCompletion\": true,\n  \"baanc.libraryMemory.showImportHints\": true\n}\nDisable library memory entirely (pure single-file editing):\n{\n  \"baanc.libraryMemory.enabled\": false,\n  \"baanc.libraryMemory.autoImportOnCompletion\": false,\n  \"baanc.libraryMemory.showImportHints\": false\n}\nLighter completions (keywords + local only):\n{\n  \"baanc.completion.includeBuiltins\": false,\n  \"baanc.completion.includeErrors\": false,\n  \"baanc.completion.includeSql\": true,\n  \"baanc.completion.include4gl\": true,\n  \"baanc.completion.includePreprocessor\": true\n}\nLanguage-specific editor defaults\nContributed under `configurationDefaults` for `[baanc]` (user settings override these):\nExample override (2-space indent for Baan only):\n{\n  \"baanc.indentSize\": 2,\n  \"[baanc]\": {\n    \"editor.tabSize\": 2\n  }\n}\nWhere memory is stored\nLibrary memory uses VS Code **Extension global state** (not workspace files):\nKey: `baanc.libraryMemory.v1`\nSurvives reloads and window restarts\nIndependent of whether the original temp file still exists\nCleared via **Baan C: Clear Memorized Libraries** or the manage UI\nGlobal state is per user profile / machine for that VS Code installation, not committed to git."},"commands":{"id":"commands","title":"Commands","group":"Guides","icon":"terminal","html":"<h1 id=\"commands\"><a class=\"anchor\" href=\"#commands\" aria-hidden=\"true\">#</a>Commands</h1>\n<p>All commands appear in the <strong>Command Palette</strong> (<code>Ctrl+Shift+P</code> / <code>Cmd+Shift+P</code>).   Most are limited to Baan C editors (<code>editorLangId == baanc</code>). Library memory management is always available.</p>\n<hr />\n<h2 id=\"command-list\"><a class=\"anchor\" href=\"#command-list\" aria-hidden=\"true\">#</a>Command list</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Title</th>\n<th>Command ID</th>\n<th>When</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><strong>Baan C: Format Document</strong></td>\n<td><code>baanc.formatDocument</code></td>\n<td>Baan editor</td>\n<td>Format the active document using the extension formatter</td>\n</tr>\n<tr>\n<td><strong>Baan C: Run Diagnostics</strong></td>\n<td><code>baanc.runDiagnostics</code></td>\n<td>Baan editor</td>\n<td>Re-run diagnostics and open the <strong>Baan C</strong> output channel</td>\n</tr>\n<tr>\n<td><strong>Baan C: Insert Select Template</strong></td>\n<td><code>baanc.insertSelectTemplate</code></td>\n<td>Baan editor</td>\n<td>Insert a full select / selectdo / selectempty / selecterror skeleton</td>\n</tr>\n<tr>\n<td><strong>Baan C: Insert Transaction + Select Template</strong></td>\n<td><code>baanc.insertTransactionTemplate</code></td>\n<td>Baan editor</td>\n<td>Insert retry-point + for-update select + commit/abort pattern</td>\n</tr>\n<tr>\n<td><strong>Baan C: Manage Memorized Libraries…</strong></td>\n<td><code>baanc.manageLibraryMemory</code></td>\n<td>always</td>\n<td>Inspect, change import kind, remove libraries/functions, or clear all</td>\n</tr>\n<tr>\n<td><strong>Baan C: Clear Memorized Libraries</strong></td>\n<td><code>baanc.clearLibraryMemory</code></td>\n<td>always</td>\n<td>Wipe all remembered library/include exports (confirmation required)</td>\n</tr>\n<tr>\n<td><strong>Baan C: Add Library Import (#include / #pragma used dll)</strong></td>\n<td><code>baanc.addLibraryImport</code></td>\n<td>Baan editor</td>\n<td>Insert the right import for the symbol under the cursor, or pick style + name</td>\n</tr>\n<tr>\n<td><strong>Baan C: Open Documentation</strong></td>\n<td><code>baanc.openDocumentation</code></td>\n<td>always</td>\n<td>Open the professional in-editor documentation (sidebar, search, all guides)</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"context-menu\"><a class=\"anchor\" href=\"#context-menu\" aria-hidden=\"true\">#</a>Context menu</h2>\n<p>On Baan C editors, the right-click menu includes:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Group</th>\n<th>Command</th>\n</tr></thead><tbody>\n<tr>\n<td>Modification</td>\n<td>Format Document</td>\n</tr>\n<tr>\n<td>Modification</td>\n<td>Insert Select Template</td>\n</tr>\n<tr>\n<td>Modification</td>\n<td>Insert Transaction + Select Template</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"standard-vs-code-language-actions\"><a class=\"anchor\" href=\"#standard-vs-code-language-actions\" aria-hidden=\"true\">#</a>Standard VS Code language actions</h2>\n<p>These are provided by the extension’s language providers (not custom command IDs):</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Action</th>\n<th>Typical shortcut (Windows/Linux)</th>\n<th>macOS</th>\n</tr></thead><tbody>\n<tr>\n<td>Format Document</td>\n<td><code>Shift+Alt+F</code></td>\n<td><code>Shift+Option+F</code></td>\n</tr>\n<tr>\n<td>Go to Definition</td>\n<td><code>F12</code></td>\n<td><code>F12</code></td>\n</tr>\n<tr>\n<td>Peek Definition</td>\n<td><code>Alt+F12</code></td>\n<td><code>Option+F12</code></td>\n</tr>\n<tr>\n<td>Find All References</td>\n<td><code>Shift+F12</code></td>\n<td><code>Shift+F12</code></td>\n</tr>\n<tr>\n<td>Rename Symbol</td>\n<td><code>F2</code></td>\n<td><code>F2</code></td>\n</tr>\n<tr>\n<td>Trigger Suggest</td>\n<td><code>Ctrl+Space</code></td>\n<td><code>Ctrl+Space</code></td>\n</tr>\n<tr>\n<td>Trigger Parameter Hints</td>\n<td><code>Ctrl+Shift+Space</code></td>\n<td><code>Cmd+Shift+Space</code></td>\n</tr>\n<tr>\n<td>Quick Fix</td>\n<td><code>Ctrl+.</code></td>\n<td><code>Cmd+.</code></td>\n</tr>\n<tr>\n<td>Fold / Unfold</td>\n<td><code>Ctrl+Shift+[</code> / <code>]</code></td>\n<td><code>Cmd+Option+[</code> / <code>]</code></td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"template-contents\"><a class=\"anchor\" href=\"#template-contents\" aria-hidden=\"true\">#</a>Template contents</h2>\n<h3 id=\"insert-select-template\"><a class=\"anchor\" href=\"#insert-select-template\" aria-hidden=\"true\">#</a>Insert Select Template</h3>\n<div class=\"code-block\" data-lang=\"baanc\"><div class=\"code-head\"><span class=\"code-lang\">baanc</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-baanc\">select  table.*\nfrom    table\nwhere   table.field\nselectdo\n\t|\nselectempty\n\t| no records\nselecterror\n\tmessage(&quot;SQL error: %d&quot;, db.error())\nendselect</code></pre></div>\n<p>Placeholders link the table name across <code>select</code> / <code>from</code> / <code>where</code>.</p>\n<h3 id=\"insert-transaction-select-template\"><a class=\"anchor\" href=\"#insert-transaction-select-template\" aria-hidden=\"true\">#</a>Insert Transaction + Select Template</h3>\n<div class=\"code-block\" data-lang=\"baanc\"><div class=\"code-head\"><span class=\"code-lang\">baanc</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-baanc\">db.retry.point()\nlong ret = 0\nselect  table.*\nfrom    table\nfor update\nwhere   table.field\nselectdo\n\t|\n\tret = db.update(table.id, db.retry)\nselectempty\n\t| no records\nendselect\nif ret = 0 then\n\tcommit.transaction()\nelse\n\tabort.transaction()\nendif</code></pre></div>\n<hr />\n<h2 id=\"library-memory-commands\"><a class=\"anchor\" href=\"#library-memory-commands\" aria-hidden=\"true\">#</a>Library memory commands</h2>\n<h3 id=\"manage-memorized-libraries\"><a class=\"anchor\" href=\"#manage-memorized-libraries\" aria-hidden=\"true\">#</a>Manage Memorized Libraries…</h3>\n<p>Opens a Quick Pick of memorized libraries. Per library you can typically:</p>\n<ul>\n<li>View import kind (<code>include</code> vs <code>dll</code>) and import statement</li>\n<li>Switch kind (<code>#include</code> ↔ <code>#pragma used dll</code>) when heuristics got it wrong</li>\n<li>Inspect function list</li>\n<li>Remove one library or clear everything</li>\n</ul>\n<p>If nothing is memorized yet, a message explains that you should open a library/include <code>.bc</code> first.</p>\n<h3 id=\"clear-memorized-libraries\"><a class=\"anchor\" href=\"#clear-memorized-libraries\" aria-hidden=\"true\">#</a>Clear Memorized Libraries</h3>\n<p>Modal confirmation:   <code>Clear all N memorized libraries (M functions)?</code></p>\n<h3 id=\"add-library-import\"><a class=\"anchor\" href=\"#add-library-import\" aria-hidden=\"true\">#</a>Add Library Import</h3>\n<ol>\n<li>If the cursor is on a symbol found in library memory, inserts the matching import.</li>\n<li>Otherwise, prompts for import style and name so you can add <code>#include &quot;…&quot;</code> or <code>#pragma used dll &quot;…&quot;</code> manually.</li>\n</ol>\n<p>Import insertion prefers a sensible location near existing <code>#include</code> / <code>#pragma</code> lines at the top of the file.</p>\n<hr />\n<h2 id=\"output-channel\"><a class=\"anchor\" href=\"#output-channel\" aria-hidden=\"true\">#</a>Output channel</h2>\n<p><strong>Baan C: Run Diagnostics</strong> writes a short line to the <strong>Baan C</strong> output channel, for example:</p>\n<div class=\"code-block\" data-lang=\"text\"><div class=\"code-head\"><span class=\"code-lang\">text</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-text\">Diagnostics refreshed for C:\\path\\to\\script.bc</code></pre></div>\n<p>Open <strong>View → Output</strong>, then select <strong>Baan C</strong> from the dropdown.</p>","toc":[{"id":"command-list","text":"Command list","level":2},{"id":"context-menu","text":"Context menu","level":2},{"id":"standard-vs-code-language-actions","text":"Standard VS Code language actions","level":2},{"id":"template-contents","text":"Template contents","level":2},{"id":"insert-select-template","text":"Insert Select Template","level":3},{"id":"insert-transaction-select-template","text":"Insert Transaction + Select Template","level":3},{"id":"library-memory-commands","text":"Library memory commands","level":2},{"id":"manage-memorized-libraries","text":"Manage Memorized Libraries…","level":3},{"id":"clear-memorized-libraries","text":"Clear Memorized Libraries","level":3},{"id":"add-library-import","text":"Add Library Import","level":3},{"id":"output-channel","text":"Output channel","level":2}],"plain":"Commands\nAll commands appear in the **Command Palette** (`Ctrl+Shift+P` / `Cmd+Shift+P`).   Most are limited to Baan C editors (`editorLangId == baanc`). Library memory management is always available.\nCommand list\nContext menu\nOn Baan C editors, the right-click menu includes:\nStandard VS Code language actions\nThese are provided by the extension’s language providers (not custom command IDs):\nTemplate contents\nInsert Select Template\nselect  table.*\nfrom    table\nwhere   table.field\nselectdo\n\t|\nselectempty\n\t| no records\nselecterror\n\tmessage(\"SQL error: %d\", db.error())\nendselect\nPlaceholders link the table name across `select` / `from` / `where`.\nInsert Transaction + Select Template\ndb.retry.point()\nlong ret = 0\nselect  table.*\nfrom    table\nfor update\nwhere   table.field\nselectdo\n\t|\n\tret = db.update(table.id, db.retry)\nselectempty\n\t| no records\nendselect\nif ret = 0 then\n\tcommit.transaction()\nelse\n\tabort.transaction()\nendif\nLibrary memory commands\nManage Memorized Libraries…\nOpens a Quick Pick of memorized libraries. Per library you can typically:\nView import kind (`include` vs `dll`) and import statement\nSwitch kind (`#include` ↔ `#pragma used dll`) when heuristics got it wrong\nInspect function list\nRemove one library or clear everything\nIf nothing is memorized yet, a message explains that you should open a library/include `.bc` first.\nClear Memorized Libraries\nModal confirmation:   `Clear all N memorized libraries (M functions)?`\nAdd Library Import\nIf the cursor is on a symbol found in library memory, inserts the matching import.\nOtherwise, prompts for import style and name so you can add `#include \"…\"` or `#pragma used dll \"…\"` manually.\nImport insertion prefers a sensible location near existing `#include` / `#pragma` lines at the top of the file.\nOutput channel\n**Baan C: Run Diagnostics** writes a short line to the **Baan C** output channel, for example:\nDiagnostics refreshed for C:\\path\\to\\script.bc\nOpen **View → Output**, then select **Baan C** from the dropdown."},"snippets":{"id":"snippets","title":"Snippets","group":"Guides","icon":"snippet","html":"<h1 id=\"snippets\"><a class=\"anchor\" href=\"#snippets\" aria-hidden=\"true\">#</a>Snippets</h1>\n<p>Snippets are contributed for language <code>baanc</code> from <code>snippets/baanc.json</code>.</p>\n<p><strong>How to use:</strong> type the <strong>prefix</strong>, then accept the suggestion (<code>Tab</code> / <code>Enter</code>).   Tab stops (<code>$1</code>, <code>$2</code>, …) move with <code>Tab</code>. Linked placeholders update together (e.g. table name in select snippets).</p>\n<hr />\n<h2 id=\"control-flow\"><a class=\"anchor\" href=\"#control-flow\" aria-hidden=\"true\">#</a>Control flow</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><code>if</code></td>\n<td>If then endif</td>\n<td><code>if … then</code> / <code>endif</code></td>\n</tr>\n<tr>\n<td><code>ife</code></td>\n<td>If then else endif</td>\n<td><code>if</code> / <code>else</code> / <code>endif</code></td>\n</tr>\n<tr>\n<td><code>ifel</code></td>\n<td>If elif else endif</td>\n<td><code>if</code> / <code>elif</code> / <code>else</code> / <code>endif</code></td>\n</tr>\n<tr>\n<td><code>while</code></td>\n<td>While endwhile</td>\n<td><code>while</code> / <code>endwhile</code></td>\n</tr>\n<tr>\n<td><code>for</code></td>\n<td>For endfor</td>\n<td><code>for i = 1 to n</code> / <code>endfor</code></td>\n</tr>\n<tr>\n<td><code>fors</code></td>\n<td>For step endfor</td>\n<td><code>for … step …</code> / <code>endfor</code></td>\n</tr>\n<tr>\n<td><code>repeat</code></td>\n<td>Repeat until</td>\n<td><code>repeat</code> / <code>until</code></td>\n</tr>\n<tr>\n<td><code>oncase</code></td>\n<td>On case</td>\n<td><code>on case</code> / <code>case</code> / <code>default</code> / <code>endcase</code></td>\n</tr>\n<tr>\n<td><code>oncases</code></td>\n<td>On case string</td>\n<td>String-oriented <code>on case</code> skeleton</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"functions\"><a class=\"anchor\" href=\"#functions\" aria-hidden=\"true\">#</a>Functions</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><code>func</code></td>\n<td>Function void</td>\n<td><code>function name(…)</code> with braces</td>\n</tr>\n<tr>\n<td><code>funcl</code></td>\n<td>Function typed</td>\n<td>Typed return (<code>long</code> / <code>double</code> / <code>string</code> / <code>void</code>) + <code>return</code></td>\n</tr>\n<tr>\n<td><code>funcex</code></td>\n<td>Function extern long</td>\n<td><code>function extern long …</code> pattern</td>\n</tr>\n<tr>\n<td><code>proto</code></td>\n<td>Prototype</td>\n<td>Function prototype declaration</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"declarations\"><a class=\"anchor\" href=\"#declarations\" aria-hidden=\"true\">#</a>Declarations</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><code>domain</code></td>\n<td>Domain declaration</td>\n<td>Domain declaration line</td>\n</tr>\n<tr>\n<td><code>table</code></td>\n<td>Table declaration</td>\n<td><code>table</code> declaration</td>\n</tr>\n<tr>\n<td><code>long</code></td>\n<td>Long declaration</td>\n<td><code>long</code> variable</td>\n</tr>\n<tr>\n<td><code>string</code></td>\n<td>String declaration</td>\n<td><code>string</code> variable</td>\n</tr>\n<tr>\n<td><code>boolean</code></td>\n<td>Boolean declaration</td>\n<td><code>boolean</code> variable</td>\n</tr>\n<tr>\n<td><code>double</code></td>\n<td>Double declaration</td>\n<td><code>double</code> variable</td>\n</tr>\n<tr>\n<td><code>extern</code></td>\n<td>Extern long</td>\n<td><code>extern long</code> declaration</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"embedded-sql-transactions\"><a class=\"anchor\" href=\"#embedded-sql-transactions\" aria-hidden=\"true\">#</a>Embedded SQL & transactions</h2>\n<p>Select snippets use <strong><code>table.*</code></strong> (not bare <code>*</code>) with linked table placeholders and column-aligned clauses.</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><code>select</code></td>\n<td>Select block</td>\n<td>Basic select / selectdo / endselect</td>\n</tr>\n<tr>\n<td><code>selectf</code></td>\n<td>Select full</td>\n<td>Full select with empty/error branches</td>\n</tr>\n<tr>\n<td><code>txselect</code></td>\n<td>Transaction with select for update</td>\n<td>Retry + for update + commit/abort style flow</td>\n</tr>\n<tr>\n<td><code>sqlpf</code></td>\n<td>SQL parse exec fetch</td>\n<td>Parse / execute / fetch helper pattern</td>\n</tr>\n<tr>\n<td><code>qext</code></td>\n<td>Query extend where</td>\n<td>Query-extend / where helper pattern</td>\n</tr>\n<tr>\n<td><code>retry</code></td>\n<td>Db retry point</td>\n<td><code>db.retry.point()</code> usage</td>\n</tr>\n<tr>\n<td><code>commit</code></td>\n<td>Commit transaction</td>\n<td><code>commit.transaction()</code></td>\n</tr>\n<tr>\n<td><code>abort</code></td>\n<td>Abort transaction</td>\n<td><code>abort.transaction()</code></td>\n</tr>\n<tr>\n<td><code>elocked</code></td>\n<td>Error check ELOCKED</td>\n<td>Lock-error handling pattern</td>\n</tr>\n</tbody></table></div>\n<p>Equivalent command templates (not prefixes):</p>\n<ul>\n<li><strong>Baan C: Insert Select Template</strong></li>\n<li><strong>Baan C: Insert Transaction + Select Template</strong></li>\n</ul>\n<p>Example shape after expanding <code>selectf</code>:</p>\n<div class=\"code-block\" data-lang=\"baanc\"><div class=\"code-head\"><span class=\"code-lang\">baanc</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-baanc\">select  table.*\nfrom    table\nwhere   table.field\nselectdo\n\t|\nselectempty\n\t|\nselecterror\n\t|\nendselect</code></pre></div>\n<hr />\n<h2 id=\"preprocessor\"><a class=\"anchor\" href=\"#preprocessor\" aria-hidden=\"true\">#</a>Preprocessor</h2>\n<p>Prefixes that start with <code>#</code> replace a partially typed <code>#…</code> so you do not get <code>##define</code>.</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><code>#include</code> / <code>include</code></td>\n<td>Include quotes</td>\n<td><code>#include &quot;filename&quot;</code></td>\n</tr>\n<tr>\n<td><code>#include&lt;</code> / <code>include&lt;</code></td>\n<td>Include angle</td>\n<td><code>#include &lt;filename&gt;</code></td>\n</tr>\n<tr>\n<td><code>#define</code> / <code>define</code></td>\n<td>Define macro</td>\n<td><code>#define NAME value</code></td>\n</tr>\n<tr>\n<td><code>#undef</code> / <code>undef</code></td>\n<td>Undef macro</td>\n<td><code>#undef NAME</code></td>\n</tr>\n<tr>\n<td><code>#if</code> / <code>ppif</code></td>\n<td>If preprocessor</td>\n<td><code>#if</code> … <code>#endif</code></td>\n</tr>\n<tr>\n<td><code>#ifdef</code> / <code>ifdef</code></td>\n<td>Ifdef block</td>\n<td><code>#ifdef</code> … <code>#endif</code></td>\n</tr>\n<tr>\n<td><code>#ifndef</code> / <code>ifndef</code></td>\n<td>Ifndef block</td>\n<td><code>#ifndef</code> … <code>#endif</code></td>\n</tr>\n<tr>\n<td><code>#pragma</code> / <code>pragma</code></td>\n<td>Pragma</td>\n<td><code>#pragma …</code></td>\n</tr>\n<tr>\n<td><code>#ident</code> / <code>ident</code></td>\n<td>Ident</td>\n<td><code>#ident &quot;@(#)…&quot;</code></td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"4gl-sections\"><a class=\"anchor\" href=\"#4gl-sections\" aria-hidden=\"true\">#</a>4GL sections</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Typical section</th>\n</tr></thead><tbody>\n<tr>\n<td><code>declaration</code></td>\n<td>4GL declaration section</td>\n<td><code>declaration:</code></td>\n</tr>\n<tr>\n<td><code>before.program</code> / <code>before.</code></td>\n<td>4GL before.program</td>\n<td><code>before.program:</code></td>\n</tr>\n<tr>\n<td><code>after.program</code></td>\n<td>4GL after.program</td>\n<td><code>after.program:</code></td>\n</tr>\n<tr>\n<td><code>before.checks</code> / <code>before.ch</code></td>\n<td>4GL before.checks</td>\n<td><code>before.checks:</code></td>\n</tr>\n<tr>\n<td><code>when.field.changes</code></td>\n<td>4GL when.field.changes</td>\n<td>field change hook</td>\n</tr>\n<tr>\n<td><code>field.</code></td>\n<td>4GL field section</td>\n<td><code>field.table.field:</code></td>\n</tr>\n<tr>\n<td><code>after.field</code></td>\n<td>4GL after.field</td>\n<td><code>after.field:</code></td>\n</tr>\n<tr>\n<td><code>check.input</code></td>\n<td>4GL check.input</td>\n<td>input validation</td>\n</tr>\n<tr>\n<td><code>choice.</code></td>\n<td>4GL choice section</td>\n<td><code>choice.…:</code></td>\n</tr>\n<tr>\n<td><code>main.table.io</code></td>\n<td>4GL main.table.io</td>\n<td><code>main.table.io:</code></td>\n</tr>\n</tbody></table></div>\n<p>Typing after a trailing dot (e.g. <code>before.</code>) continues to match dotted 4GL completions.</p>\n<hr />\n<h2 id=\"apis-patterns\"><a class=\"anchor\" href=\"#apis-patterns\" aria-hidden=\"true\">#</a>APIs & patterns</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Prefix</th>\n<th>Name</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><code>message</code></td>\n<td>Message</td>\n<td><code>message(&quot;…&quot;)</code></td>\n</tr>\n<tr>\n<td><code>dalgs</code></td>\n<td>DAL get and save object</td>\n<td>DAL get/save skeleton</td>\n</tr>\n<tr>\n<td><code>httpget</code></td>\n<td>HTTP GET pattern</td>\n<td>HTTP client GET flow</td>\n</tr>\n<tr>\n<td><code>curlget</code></td>\n<td>cURL download string</td>\n<td>cURL download skeleton</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"tips\"><a class=\"anchor\" href=\"#tips\" aria-hidden=\"true\">#</a>Tips</h2>\n<ol>\n<li><strong>Snippets vs completions</strong> — Snippets appear alongside keyword/builtin completions. Use the description/detail column to pick the right item.</li>\n<li><strong>SQL alignment</strong> — After inserting a select snippet, run <strong>Format Document</strong> if you have mixed hand-edited clauses; the formatter re-aligns SQL keywords.</li>\n<li><strong>Disable a category of keyword completions</strong> — Snippets remain available even if you turn off builtin/SQL completion settings; only dynamic completion sources are gated (see <a href=\"#/configuration\" data-route=\"configuration\">Configuration</a>).</li>\n<li><strong>Discover all snippets</strong> — Command Palette → <strong>Snippets: Insert Snippet</strong> while a Baan file is focused.</li>\n</ol>","toc":[{"id":"control-flow","text":"Control flow","level":2},{"id":"functions","text":"Functions","level":2},{"id":"declarations","text":"Declarations","level":2},{"id":"embedded-sql-transactions","text":"Embedded SQL & transactions","level":2},{"id":"preprocessor","text":"Preprocessor","level":2},{"id":"4gl-sections","text":"4GL sections","level":2},{"id":"apis-patterns","text":"APIs & patterns","level":2},{"id":"tips","text":"Tips","level":2}],"plain":"Snippets\nSnippets are contributed for language `baanc` from `snippets/baanc.json`.\n**How to use:** type the **prefix**, then accept the suggestion (`Tab` / `Enter`).   Tab stops (`$1`, `$2`, …) move with `Tab`. Linked placeholders update together (e.g. table name in select snippets).\nControl flow\nFunctions\nDeclarations\nEmbedded SQL & transactions\nSelect snippets use **`table.*`** (not bare `*`) with linked table placeholders and column-aligned clauses.\nEquivalent command templates (not prefixes):\n**Baan C: Insert Select Template**\n**Baan C: Insert Transaction + Select Template**\nExample shape after expanding `selectf`:\nselect  table.*\nfrom    table\nwhere   table.field\nselectdo\n\t|\nselectempty\n\t|\nselecterror\n\t|\nendselect\nPreprocessor\nPrefixes that start with `#` replace a partially typed `#…` so you do not get `##define`.\n4GL sections\nTyping after a trailing dot (e.g. `before.`) continues to match dotted 4GL completions.\nAPIs & patterns\nTips\n**Snippets vs completions** — Snippets appear alongside keyword/builtin completions. Use the description/detail column to pick the right item.\n**SQL alignment** — After inserting a select snippet, run **Format Document** if you have mixed hand-edited clauses; the formatter re-aligns SQL keywords.\n**Disable a category of keyword completions** — Snippets remain available even if you turn off builtin/SQL completion settings; only dynamic completion sources are gated (see [Configuration](./configuration.md)).\n**Discover all snippets** — Command Palette → **Snippets: Insert Snippet** while a Baan file is focused."},"library-memory":{"id":"library-memory","title":"Library memory","group":"Guides","icon":"memory","html":"<h1 id=\"library-memory\"><a class=\"anchor\" href=\"#library-memory\" aria-hidden=\"true\">#</a>Library memory</h1>\n<p>Library memory is designed for <strong>BECS</strong> and other workflows where library or include sources open as temporary <code>.bc</code> files and then disappear. The extension <strong>learns</strong> exported functions while the file is open and keeps them for completions, hovers, signature help, and auto-import—even after the temp file is deleted.</p>\n<hr />\n<h2 id=\"why-it-exists\"><a class=\"anchor\" href=\"#why-it-exists\" aria-hidden=\"true\">#</a>Why it exists</h2>\n<p>Typical BECS flow:</p>\n<ol>\n<li>You open a session script in VS Code.</li>\n<li>You jump to a library/include; BECS dumps a temporary <code>.bc</code> path.</li>\n<li>You close the temp buffer; the file may be deleted from disk.</li>\n<li>Without memory, completions for that library vanish.</li>\n</ol>\n<p>With library memory enabled, step 4 no longer loses the API surface.</p>\n<p>Storage: VS Code <strong>extension global state</strong> key <code>baanc.libraryMemory.v1</code> (survives reloads).</p>\n<hr />\n<h2 id=\"how-learning-works\"><a class=\"anchor\" href=\"#how-learning-works\" aria-hidden=\"true\">#</a>How learning works</h2>\n<p>When a <code>baanc</code> document is opened or edited (debounced), the extension:</p>\n<ol>\n<li>Derives a <strong>script name</strong> from the URI (filename without extension).</li>\n<li>Parses <code>function</code> headers (skips block-comment noise).</li>\n<li>Classifies the source as <strong>include</strong> or <strong>dll</strong> (see below).</li>\n<li>Stores functions:</li>\n</ol>\n<ul>\n<li><strong>DLL:</strong> only <code>function extern …</code> (linkable exports)</li>\n<li><strong>Include:</strong> non-static functions (includes expose callable helpers more broadly)</li>\n</ul>\n<ol>\n<li>Updates <code>lastSeen</code> and optional <code>sourceHint</code> (filesystem path when available).</li>\n<li>Prunes by LRU when over <code>baanc.libraryMemory.maxLibraries</code>.</li>\n<li>Caps functions per library with <code>baanc.libraryMemory.maxFunctionsPerLibrary</code>.</li>\n</ol>\n<p>Empty parses do <strong>not</strong> wipe a previously good memory (protects mid-edit stubs and incomplete BECS buffers).</p>\n<p>Disable entirely with <code>baanc.libraryMemory.enabled: false</code>.</p>\n<hr />\n<h2 id=\"include-vs-dll-import-forms\"><a class=\"anchor\" href=\"#include-vs-dll-import-forms\" aria-hidden=\"true\">#</a>Include vs DLL import forms</h2>\n<p>Baan/Infor uses two different import styles:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Kind</th>\n<th>Typical source</th>\n<th>Import written by the extension</th>\n</tr></thead><tbody>\n<tr>\n<td><strong>include</strong></td>\n<td>Include scripts such as <code>itxadv0000</code></td>\n<td><code>#include &quot;itxadv0000&quot;</code></td>\n</tr>\n<tr>\n<td><strong>dll</strong></td>\n<td>Compiled DLL objects such as <code>tccomdll0200</code></td>\n<td><code>#pragma used dll &quot;otccomdll0200&quot;</code></td>\n</tr>\n</tbody></table></div>\n<p>Object names for DLLs commonly use a leading <code>o</code> (<code>otccomdll0200</code>). The extension normalizes this when generating the pragma.</p>\n<h3 id=\"automatic-classification-heuristics\"><a class=\"anchor\" href=\"#automatic-classification-heuristics\" aria-hidden=\"true\">#</a>Automatic classification heuristics</h3>\n<p><code>detectImportKind</code> (simplified):</p>\n<ol>\n<li>Name contains <code>dll</code> → <strong>dll</strong></li>\n<li>Classic include pattern: leading <code>i</code> + package-like name (e.g. <code>itxadv0000</code>), excluding session-like codes → <strong>include</strong></li>\n<li>Content heuristics:</li>\n</ol>\n<ul>\n<li>No <code>function extern</code>, but several <code>#define</code> / <code>prototype</code> → <strong>include</strong></li>\n<li>Has <code>function extern</code> → <strong>dll</strong></li>\n</ul>\n<ol>\n<li>Fallback → <strong>include</strong></li>\n</ol>\n<p>If classification is wrong for your naming scheme, open <strong>Baan C: Manage Memorized Libraries…</strong> and switch the kind (can be locked so later learns do not flip it back, depending on manager actions).</p>\n<hr />\n<h2 id=\"completions-and-documentation\"><a class=\"anchor\" href=\"#completions-and-documentation\" aria-hidden=\"true\">#</a>Completions and documentation</h2>\n<p>Memorized exports appear with detail labels similar to:</p>\n<ul>\n<li><code>include · itxadv0000</code></li>\n<li><code>dll · otccomdll0200</code></li>\n</ul>\n<p>Hover and signature help use the stored function header when available.</p>\n<hr />\n<h2 id=\"auto-import-on-completion\"><a class=\"anchor\" href=\"#auto-import-on-completion\" aria-hidden=\"true\">#</a>Auto-import on completion</h2>\n<p>When <code>baanc.libraryMemory.autoImportOnCompletion</code> is <code>true</code> (default):</p>\n<ol>\n<li>You accept a completion that comes from a memorized library.</li>\n<li>If the document does not already import that library, the extension inserts:</li>\n</ol>\n<p>``<code>baanc    #include &quot;itxadv0000&quot;    </code>``</p>\n<p>or</p>\n<p>``<code>baanc    #pragma used dll &quot;otccomdll0200&quot;    </code>``</p>\n<ol>\n<li>Insertion prefers a clean location near existing includes/pragmas (top of file, after last <code>#include</code> or <code>#pragma</code> as appropriate).</li>\n</ol>\n<p>Duplicate detection is tolerant of <code>o</code> prefix variants and path/extension noise on includes.</p>\n<hr />\n<h2 id=\"import-hints-and-quick-fix\"><a class=\"anchor\" href=\"#import-hints-and-quick-fix\" aria-hidden=\"true\">#</a>Import hints and Quick Fix</h2>\n<p>When <code>baanc.libraryMemory.showImportHints</code> is <code>true</code>:</p>\n<ul>\n<li>Calls that match a memorized export without a matching import get an <strong>Information</strong> diagnostic.</li>\n<li><strong>Quick Fix</strong> (<code>Ctrl+.</code> / <code>Cmd+.</code>) inserts the correct import.</li>\n</ul>\n<p>Diagnostic codes (internal):</p>\n<ul>\n<li><code>missing-library-import</code></li>\n<li><code>missing-builtin-library-import</code> (for mapped builtins)</li>\n</ul>\n<hr />\n<h2 id=\"builtin-auto-import-conservative\"><a class=\"anchor\" href=\"#builtin-auto-import-conservative\" aria-hidden=\"true\">#</a>Builtin auto-import (conservative)</h2>\n<p>Separate from library memory, some built-ins may declare an optional DLL:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Role</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.autoImport.builtinsOnCompletion</code></td>\n<td>Insert <code>#pragma used dll</code> on completion accept when mapping exists</td>\n</tr>\n<tr>\n<td><code>baanc.autoImport.builtinImportHints</code></td>\n<td>Soft hints when such a builtin is used without the pragma</td>\n</tr>\n</tbody></table></div>\n<p>The default mapping tables are <strong>intentionally sparse</strong>. The extension does <strong>not</strong> invent package DLL names for arbitrary APIs, because Infor LN installations differ. Prefer opening real DLL sources so library memory learns the truth.</p>\n<hr />\n<h2 id=\"managing-memory\"><a class=\"anchor\" href=\"#managing-memory\" aria-hidden=\"true\">#</a>Managing memory</h2>\n<h3 id=\"command-manage-memorized-libraries\"><a class=\"anchor\" href=\"#command-manage-memorized-libraries\" aria-hidden=\"true\">#</a>Command: Manage Memorized Libraries…</h3>\n<p>Quick Pick lists each library with:</p>\n<ul>\n<li>Import target and kind tag (<code>include</code> / <code>dll</code>)</li>\n<li>Function count</li>\n<li>Age (<code>lastSeen</code>)</li>\n<li>Generated import statement and optional source path</li>\n</ul>\n<p>Actions typically include:</p>\n<ul>\n<li>Open details / list functions</li>\n<li>Switch import kind</li>\n<li>Remove one library</li>\n<li>Clear all</li>\n</ul>\n<h3 id=\"command-clear-memorized-libraries\"><a class=\"anchor\" href=\"#command-clear-memorized-libraries\" aria-hidden=\"true\">#</a>Command: Clear Memorized Libraries</h3>\n<p>Modal confirmation, then wipes the entire store and refreshes diagnostics on open Baan documents.</p>\n<h3 id=\"command-add-library-import\"><a class=\"anchor\" href=\"#command-add-library-import\" aria-hidden=\"true\">#</a>Command: Add Library Import</h3>\n<ul>\n<li>Cursor on a memorized symbol → insert that library’s import</li>\n<li>Otherwise → choose style and name manually</li>\n</ul>\n<hr />\n<h2 id=\"recommended-becs-workflow\"><a class=\"anchor\" href=\"#recommended-becs-workflow\" aria-hidden=\"true\">#</a>Recommended BECS workflow</h2>\n<ol>\n<li>Keep <code>baanc.libraryMemory.enabled</code> and <code>autoImportOnCompletion</code> on (defaults).</li>\n<li>When you need a library API, open the library/include from BECS once.</li>\n<li>Wait a moment (learn is debounced ~400 ms) or edit/save so the document is processed.</li>\n<li>Return to your session script; type the function name and accept the completion.</li>\n<li>Confirm the auto-inserted <code>#include</code> or <code>#pragma used dll</code> at the top.</li>\n<li>If kind is wrong, fix it once in <strong>Manage Memorized Libraries…</strong>.</li>\n</ol>\n<p>Optional hygiene:</p>\n<ul>\n<li>Raise <code>maxLibraries</code> if you jump across many packages in one day.</li>\n<li>Clear memory after finishing a large unrelated project to reduce stale completions.</li>\n</ul>\n<hr />\n<h2 id=\"settings-summary\"><a class=\"anchor\" href=\"#settings-summary\" aria-hidden=\"true\">#</a>Settings summary</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Default</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.libraryMemory.enabled</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.maxLibraries</code></td>\n<td><code>40</code></td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.maxFunctionsPerLibrary</code></td>\n<td><code>200</code></td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.autoImportOnCompletion</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.showImportHints</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>baanc.autoImport.builtinsOnCompletion</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>baanc.autoImport.builtinImportHints</code></td>\n<td><code>true</code></td>\n</tr>\n</tbody></table></div>\n<p>Full descriptions: <a href=\"#/configuration\" data-route=\"configuration\">Configuration</a>.</p>\n<hr />\n<h2 id=\"limitations\"><a class=\"anchor\" href=\"#limitations\" aria-hidden=\"true\">#</a>Limitations</h2>\n<ul>\n<li>Memory is <strong>not</strong> a full project indexer; it only knows libraries you actually opened (or previously learned).</li>\n<li>Classification heuristics can mis-tag unusual names — use the manager to override.</li>\n<li>Cross-file <strong>rename</strong> / <strong>find all references</strong> still operate on the current file only.</li>\n<li>Untitled buffers without a usable name are not learned.</li>\n<li>Empty or incomplete temp buffers will not overwrite a good prior extract.</li>\n</ul>","toc":[{"id":"why-it-exists","text":"Why it exists","level":2},{"id":"how-learning-works","text":"How learning works","level":2},{"id":"include-vs-dll-import-forms","text":"Include vs DLL import forms","level":2},{"id":"automatic-classification-heuristics","text":"Automatic classification heuristics","level":3},{"id":"completions-and-documentation","text":"Completions and documentation","level":2},{"id":"auto-import-on-completion","text":"Auto-import on completion","level":2},{"id":"import-hints-and-quick-fix","text":"Import hints and Quick Fix","level":2},{"id":"builtin-auto-import-conservative","text":"Builtin auto-import (conservative)","level":2},{"id":"managing-memory","text":"Managing memory","level":2},{"id":"command-manage-memorized-libraries","text":"Command: Manage Memorized Libraries…","level":3},{"id":"command-clear-memorized-libraries","text":"Command: Clear Memorized Libraries","level":3},{"id":"command-add-library-import","text":"Command: Add Library Import","level":3},{"id":"recommended-becs-workflow","text":"Recommended BECS workflow","level":2},{"id":"settings-summary","text":"Settings summary","level":2},{"id":"limitations","text":"Limitations","level":2}],"plain":"Library memory\nLibrary memory is designed for **BECS** and other workflows where library or include sources open as temporary `.bc` files and then disappear. The extension **learns** exported functions while the file is open and keeps them for completions, hovers, signature help, and auto-import—even after the temp file is deleted.\nWhy it exists\nTypical BECS flow:\nYou open a session script in VS Code.\nYou jump to a library/include; BECS dumps a temporary `.bc` path.\nYou close the temp buffer; the file may be deleted from disk.\nWithout memory, completions for that library vanish.\nWith library memory enabled, step 4 no longer loses the API surface.\nStorage: VS Code **extension global state** key `baanc.libraryMemory.v1` (survives reloads).\nHow learning works\nWhen a `baanc` document is opened or edited (debounced), the extension:\nDerives a **script name** from the URI (filename without extension).\nParses `function` headers (skips block-comment noise).\nClassifies the source as **include** or **dll** (see below).\nStores functions:\n**DLL:** only `function extern …` (linkable exports)\n**Include:** non-static functions (includes expose callable helpers more broadly)\nUpdates `lastSeen` and optional `sourceHint` (filesystem path when available).\nPrunes by LRU when over `baanc.libraryMemory.maxLibraries`.\nCaps functions per library with `baanc.libraryMemory.maxFunctionsPerLibrary`.\nEmpty parses do **not** wipe a previously good memory (protects mid-edit stubs and incomplete BECS buffers).\nDisable entirely with `baanc.libraryMemory.enabled: false`.\nInclude vs DLL import forms\nBaan/Infor uses two different import styles:\nObject names for DLLs commonly use a leading `o` (`otccomdll0200`). The extension normalizes this when generating the pragma.\nAutomatic classification heuristics\n`detectImportKind` (simplified):\nName contains `dll` → **dll**\nClassic include pattern: leading `i` + package-like name (e.g. `itxadv0000`), excluding session-like codes → **include**\nContent heuristics:\nNo `function extern`, but several `#define` / `prototype` → **include**\nHas `function extern` → **dll**\nFallback → **include**\nIf classification is wrong for your naming scheme, open **Baan C: Manage Memorized Libraries…** and switch the kind (can be locked so later learns do not flip it back, depending on manager actions).\nCompletions and documentation\nMemorized exports appear with detail labels similar to:\n`include · itxadv0000`\n`dll · otccomdll0200`\nHover and signature help use the stored function header when available.\nAuto-import on completion\nWhen `baanc.libraryMemory.autoImportOnCompletion` is `true` (default):\nYou accept a completion that comes from a memorized library.\nIf the document does not already import that library, the extension inserts:\n```baanc    #include \"itxadv0000\"    ```\nor\n```baanc    #pragma used dll \"otccomdll0200\"    ```\nInsertion prefers a clean location near existing includes/pragmas (top of file, after last `#include` or `#pragma` as appropriate).\nDuplicate detection is tolerant of `o` prefix variants and path/extension noise on includes.\nImport hints and Quick Fix\nWhen `baanc.libraryMemory.showImportHints` is `true`:\nCalls that match a memorized export without a matching import get an **Information** diagnostic.\n**Quick Fix** (`Ctrl+.` / `Cmd+.`) inserts the correct import.\nDiagnostic codes (internal):\n`missing-library-import`\n`missing-builtin-library-import` (for mapped builtins)\nBuiltin auto-import (conservative)\nSeparate from library memory, some built-ins may declare an optional DLL:\nThe default mapping tables are **intentionally sparse**. The extension does **not** invent package DLL names for arbitrary APIs, because Infor LN installations differ. Prefer opening real DLL sources so library memory learns the truth.\nManaging memory\nCommand: Manage Memorized Libraries…\nQuick Pick lists each library with:\nImport target and kind tag (`include` / `dll`)\nFunction count\nAge (`lastSeen`)\nGenerated import statement and optional source path\nActions typically include:\nOpen details / list functions\nSwitch import kind\nRemove one library\nClear all\nCommand: Clear Memorized Libraries\nModal confirmation, then wipes the entire store and refreshes diagnostics on open Baan documents.\nCommand: Add Library Import\nCursor on a memorized symbol → insert that library’s import\nOtherwise → choose style and name manually\nRecommended BECS workflow\nKeep `baanc.libraryMemory.enabled` and `autoImportOnCompletion` on (defaults).\nWhen you need a library API, open the library/include from BECS once.\nWait a moment (learn is debounced ~400 ms) or edit/save so the document is processed.\nReturn to your session script; type the function name and accept the completion.\nConfirm the auto-inserted `#include` or `#pragma used dll` at the top.\nIf kind is wrong, fix it once in **Manage Memorized Libraries…**.\nOptional hygiene:\nRaise `maxLibraries` if you jump across many packages in one day.\nClear memory after finishing a large unrelated project to reduce stale completions.\nSettings summary\nFull descriptions: [Configuration](./configuration.md).\nLimitations\nMemory is **not** a full project indexer; it only knows libraries you actually opened (or previously learned).\nClassification heuristics can mis-tag unusual names — use the manager to override.\nCross-file **rename** / **find all references** still operate on the current file only.\nUntitled buffers without a usable name are not learned.\nEmpty or incomplete temp buffers will not overwrite a good prior extract."},"development":{"id":"development","title":"Development","group":"Contribute","icon":"code","html":"<h1 id=\"development\"><a class=\"anchor\" href=\"#development\" aria-hidden=\"true\">#</a>Development</h1>\n<p>Guide for building, debugging, packaging, and navigating the <strong>Baan C VSCode</strong> codebase.</p>\n<hr />\n<h2 id=\"prerequisites\"><a class=\"anchor\" href=\"#prerequisites\" aria-hidden=\"true\">#</a>Prerequisites</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Tool</th>\n<th>Notes</th>\n</tr></thead><tbody>\n<tr>\n<td><strong>Node.js</strong></td>\n<td>LTS recommended (for <code>npm</code> / <code>npx</code>)</td>\n</tr>\n<tr>\n<td><strong>npm</strong></td>\n<td>Ships with Node</td>\n</tr>\n<tr>\n<td><strong>VS Code</strong></td>\n<td><code>^1.125.0</code> for Extension Development Host</td>\n</tr>\n<tr>\n<td><strong>@vscode/vsce</strong></td>\n<td>Only needed to package <code>.vsix</code> (<code>npx</code> is enough)</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"clone-and-install\"><a class=\"anchor\" href=\"#clone-and-install\" aria-hidden=\"true\">#</a>Clone and install</h2>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\">git clone https://github.com/GABRYCA/baan-c-vscode.git\ncd baan-c-vscode\nnpm install</code></pre></div>\n<hr />\n<h2 id=\"project-layout\"><a class=\"anchor\" href=\"#project-layout\" aria-hidden=\"true\">#</a>Project layout</h2>\n<div class=\"code-block\" data-lang=\"text\"><div class=\"code-head\"><span class=\"code-lang\">text</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-text\">baan-c-support/          # repository root (name may vary locally)\n├── package.json         # extension manifest, contributes, scripts\n├── esbuild.js           # bundles src → dist/extension.js\n├── language-configuration.json\n├── syntaxes/\n│   └── baanc.tmLanguage.json\n├── snippets/\n│   └── baanc.json\n├── icons/               # marketplace + language icons\n├── src/\n│   ├── extension.js     # activation, providers, formatter, diagnostics\n│   ├── builtins.js      # ~980+ API + error constants\n│   ├── libraryMemory.js # learn / store / auto-import / manager UI\n│   └── test/            # tests / smoke helpers\n├── dist/\n│   └── extension.js     # bundled entry (runtime main)\n├── docs/                # markdown sources + generated index.html site\n├── scripts/\n│   └── build-docs.js    # builds docs/index.html from docs/*.md\n├── CHANGELOG.md\n├── README.md\n└── LICENSE</code></pre></div>\n<h3 id=\"runtime-entry\"><a class=\"anchor\" href=\"#runtime-entry\" aria-hidden=\"true\">#</a>Runtime entry</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Field</th>\n<th>Value</th>\n</tr></thead><tbody>\n<tr>\n<td><code>package.json</code> → <code>main</code></td>\n<td><code>./dist/extension.js</code></td>\n</tr>\n<tr>\n<td>Source entry</td>\n<td><code>src/extension.js</code></td>\n</tr>\n<tr>\n<td>Activation</td>\n<td><code>onLanguage:baanc</code></td>\n</tr>\n</tbody></table></div>\n<h3 id=\"source-modules\"><a class=\"anchor\" href=\"#source-modules\" aria-hidden=\"true\">#</a>Source modules</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>File</th>\n<th>Responsibility</th>\n</tr></thead><tbody>\n<tr>\n<td><code>src/extension.js</code></td>\n<td><code>activate</code> / <code>deactivate</code>; completions, hover, definition, references, rename, highlights, folding, symbols, signature help, formatting, diagnostics, code actions, commands</td>\n</tr>\n<tr>\n<td><code>src/builtins.js</code></td>\n<td><code>BUILTIN_FUNCTIONS</code>, <code>ERROR_CONSTANTS</code>, lookup maps, signature parsing</td>\n</tr>\n<tr>\n<td><code>src/libraryMemory.js</code></td>\n<td>Persistent library store, import edits, manager Quick Pick, builtin DLL resolve hooks</td>\n</tr>\n<tr>\n<td><code>src/docsViewer.js</code></td>\n<td>Webview host for the single-file documentation site</td>\n</tr>\n</tbody></table></div>\n<p>There is <strong>no</strong> separate language server process; all providers run in the extension host.</p>\n<h3 id=\"documentation-site\"><a class=\"anchor\" href=\"#documentation-site\" aria-hidden=\"true\">#</a>Documentation site</h3>\n<p>Markdown under <code>docs/*.md</code> is the source of truth. The professional SPA lives at <code>docs/index.html</code> (sidebar, search, light/dark theme). Regenerate after editing guides:</p>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\">npm run docs:build</code></pre></div>\n<p>Open via <strong>Baan C: Open Documentation</strong> in the Command Palette, or open <code>docs/index.html</code> in a browser.</p>\n<hr />\n<h2 id=\"scripts\"><a class=\"anchor\" href=\"#scripts\" aria-hidden=\"true\">#</a>Scripts</h2>\n<p>Defined in <code>package.json</code>:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Script</th>\n<th>Command</th>\n<th>Purpose</th>\n</tr></thead><tbody>\n<tr>\n<td><code>compile</code></td>\n<td><code>node esbuild.js</code></td>\n<td>One-shot development bundle (with sourcemap)</td>\n</tr>\n<tr>\n<td><code>watch</code></td>\n<td><code>node esbuild.js --watch</code></td>\n<td>Rebuild on change</td>\n</tr>\n<tr>\n<td><code>package</code></td>\n<td><code>node esbuild.js --production</code></td>\n<td>Minified production bundle</td>\n</tr>\n<tr>\n<td><code>docs:build</code></td>\n<td><code>node scripts/build-docs.js</code></td>\n<td>Rebuild single-file docs site (<code>docs/index.html</code>)</td>\n</tr>\n<tr>\n<td><code>vscode:prepublish</code></td>\n<td>production esbuild + docs build</td>\n<td>Runs automatically before <code>vsce package</code> / publish</td>\n</tr>\n<tr>\n<td><code>lint</code></td>\n<td><code>eslint src</code></td>\n<td>Lint source</td>\n</tr>\n</tbody></table></div>\n<h3 id=\"esbuild-options\"><a class=\"anchor\" href=\"#esbuild-options\" aria-hidden=\"true\">#</a>esbuild options</h3>\n<p><code>esbuild.js</code> builds:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Option</th>\n<th>Value</th>\n</tr></thead><tbody>\n<tr>\n<td>Entry</td>\n<td><code>src/extension.js</code></td>\n</tr>\n<tr>\n<td>Outfile</td>\n<td><code>dist/extension.js</code></td>\n</tr>\n<tr>\n<td>Format</td>\n<td>CommonJS</td>\n</tr>\n<tr>\n<td>Platform</td>\n<td><code>node</code></td>\n</tr>\n<tr>\n<td>External</td>\n<td><code>vscode</code></td>\n</tr>\n<tr>\n<td>Production</td>\n<td>minify on, sourcemap off</td>\n</tr>\n<tr>\n<td>Development</td>\n<td>minify off, sourcemap on</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"debug-in-extension-development-host\"><a class=\"anchor\" href=\"#debug-in-extension-development-host\" aria-hidden=\"true\">#</a>Debug in Extension Development Host</h2>\n<ol>\n<li>Open the repository folder in VS Code.</li>\n<li>Run <code>npm run compile</code> (or <code>npm run watch</code> in a terminal).</li>\n<li>Press <strong>F5</strong> or run the <strong>Run Extension</strong> launch configuration (<code>.vscode/launch.json</code>).</li>\n<li>A new <strong>Extension Development Host</strong> window opens with the extension loaded from the workspace.</li>\n<li>Open a <code>.bc</code> file and exercise features.</li>\n<li>Set breakpoints in <code>src/*.js</code> (sourcemaps map into the bundle in non-production builds).</li>\n<li>Reload the Extension Development Host (<code>Ctrl+R</code> / <code>Cmd+R</code>) after rebuilds if needed.</li>\n</ol>\n<p>Launch config (simplified):</p>\n<div class=\"code-block\" data-lang=\"json\"><div class=\"code-head\"><span class=\"code-lang\">json</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;Run Extension&quot;,\n  &quot;type&quot;: &quot;extensionHost&quot;,\n  &quot;request&quot;: &quot;launch&quot;,\n  &quot;args&quot;: [&quot;--extensionDevelopmentPath=${workspaceFolder}&quot;]\n}</code></pre></div>\n<hr />\n<h2 id=\"lint\"><a class=\"anchor\" href=\"#lint\" aria-hidden=\"true\">#</a>Lint</h2>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\">npm run lint</code></pre></div>\n<p>ESLint config: <code>eslint.config.mjs</code> (flat config). Scope: <code>src/</code>.</p>\n<hr />\n<h2 id=\"package-a-vsix\"><a class=\"anchor\" href=\"#package-a-vsix\" aria-hidden=\"true\">#</a>Package a VSIX</h2>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\">npm install\nnpx @vscode/vsce package</code></pre></div>\n<p>This will:</p>\n<ol>\n<li>Run <code>vscode:prepublish</code> → production esbuild</li>\n<li>Package files according to <code>.vscodeignore</code></li>\n<li>Emit something like <code>baan-c-vscode-1.0.6.vsix</code> in the project root</li>\n</ol>\n<p>Install locally:</p>\n<ol>\n<li>Command Palette → <strong>Extensions: Install from VSIX…</strong></li>\n<li>Select the generated file</li>\n</ol>\n<h3 id=\"what-is-excluded-from-the-package\"><a class=\"anchor\" href=\"#what-is-excluded-from-the-package\" aria-hidden=\"true\">#</a>What is excluded from the package</h3>\n<p><code>.vscodeignore</code> omits (among other things):</p>\n<ul>\n<li><code>src/**</code> (sources; only <code>dist/</code> is shipped)</li>\n<li><code>node_modules/**</code></li>\n<li><code>.vscode/**</code></li>\n<li>maps, TypeScript, eslint config, esbuild script, quickstart notes</li>\n</ul>\n<p>Shipped essentials: <code>package.json</code>, <code>dist/extension.js</code>, <code>syntaxes/</code>, <code>snippets/</code>, <code>language-configuration.json</code>, <code>icons/</code>, README/CHANGELOG/LICENSE as applicable.</p>\n<hr />\n<h2 id=\"publish-maintainers\"><a class=\"anchor\" href=\"#publish-maintainers\" aria-hidden=\"true\">#</a>Publish (maintainers)</h2>\n<p>Typical flow with <code>vsce</code> / Azure DevOps publisher account:</p>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\"># bump version in package.json, update CHANGELOG.md\nnpm run package          # or rely on prepublish\nnpx @vscode/vsce publish</code></pre></div>\n<p>Publisher id in manifest: <code>AnonymousGCA</code>.   Extension name: <code>baan-c-vscode</code>.   Marketplace item: <code>AnonymousGCA.baan-c-vscode</code>.</p>\n<p>Always update <a href=\"../CHANGELOG.md\" class=\"ext-link\">CHANGELOG.md</a> before a release.</p>\n<hr />\n<h2 id=\"adding-features-pointers\"><a class=\"anchor\" href=\"#adding-features-pointers\" aria-hidden=\"true\">#</a>Adding features (pointers)</h2>\n<h3 id=\"new-builtin-completions\"><a class=\"anchor\" href=\"#new-builtin-completions\" aria-hidden=\"true\">#</a>New builtin completions</h3>\n<p>Edit <code>src/builtins.js</code> — append to <code>BUILTIN_FUNCTIONS</code>:</p>\n<div class=\"code-block\" data-lang=\"js\"><div class=\"code-head\"><span class=\"code-lang\">js</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-js\">{\n  name: 'my.api.call',\n  detail: 'long · short summary',\n  doc: '```baanc\\nlong my.api.call(...)\\n```\\nDescription.',\n  insert: 'my.api.call(${1:arg})$0'\n  // optional: dll: 'osome.object'  // only if truly required &amp; known\n}</code></pre></div>\n<h3 id=\"new-snippets\"><a class=\"anchor\" href=\"#new-snippets\" aria-hidden=\"true\">#</a>New snippets</h3>\n<p>Edit <code>snippets/baanc.json</code> — VS Code snippet schema (<code>prefix</code>, <code>body</code>, <code>description</code>).</p>\n<h3 id=\"new-settings-commands\"><a class=\"anchor\" href=\"#new-settings-commands\" aria-hidden=\"true\">#</a>New settings / commands</h3>\n<ol>\n<li>Declare under <code>contributes.configuration</code> / <code>contributes.commands</code> in <code>package.json</code>.</li>\n<li>Wire handlers in <code>src/extension.js</code> <code>activate()</code>.</li>\n<li>Document in <code>docs/configuration.md</code> / <code>docs/commands.md</code> and CHANGELOG.</li>\n</ol>\n<h3 id=\"grammar-language-config\"><a class=\"anchor\" href=\"#grammar-language-config\" aria-hidden=\"true\">#</a>Grammar / language config</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>File</th>\n<th>Change when…</th>\n</tr></thead><tbody>\n<tr>\n<td><code>syntaxes/baanc.tmLanguage.json</code></td>\n<td>New highlight scopes / patterns</td>\n</tr>\n<tr>\n<td><code>language-configuration.json</code></td>\n<td>Comments, indent, folding markers, word pattern</td>\n</tr>\n</tbody></table></div>\n<h3 id=\"library-memory-behavior\"><a class=\"anchor\" href=\"#library-memory-behavior\" aria-hidden=\"true\">#</a>Library memory behavior</h3>\n<p>All learning, import edits, and manager UI live in <code>src/libraryMemory.js</code>. Keep import classification conservative; prefer manager overrides over aggressive guessing.</p>\n<hr />\n<h2 id=\"versioning\"><a class=\"anchor\" href=\"#versioning\" aria-hidden=\"true\">#</a>Versioning</h2>\n<p>Current version is read from <code>package.json</code> (<code>version</code> field). Documentation hub (<code>docs/README.md</code>) should stay aligned after releases.</p>\n<p>Suggested release checklist:</p>\n<ul>\n<li>[ ] <code>CHANGELOG.md</code> entry with date</li>\n<li>[ ] Version bump in <code>package.json</code></li>\n<li>[ ] <code>npm run lint</code></li>\n<li>[ ] Manual smoke test in Extension Development Host</li>\n<li>[ ] <code>npx @vscode/vsce package</code> and install smoke</li>\n<li>[ ] Publish (if applicable)</li>\n<li>[ ] Update docs version badge/table if present</li>\n</ul>\n<hr />\n<h2 id=\"tests\"><a class=\"anchor\" href=\"#tests\" aria-hidden=\"true\">#</a>Tests</h2>\n<p>Lightweight helpers live under <code>src/test/</code> (e.g. smoke for library memory). Expand coverage as features grow; there is no heavy CI suite required for basic packaging.</p>\n<hr />\n<h2 id=\"related-docs\"><a class=\"anchor\" href=\"#related-docs\" aria-hidden=\"true\">#</a>Related docs</h2>\n<ul>\n<li><a href=\"#/features\" data-route=\"features\">Features</a></li>\n<li><a href=\"#/configuration\" data-route=\"configuration\">Configuration</a></li>\n<li><a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a></li>\n<li><a href=\"#/troubleshooting\" data-route=\"troubleshooting\">Troubleshooting</a></li>\n</ul>","toc":[{"id":"prerequisites","text":"Prerequisites","level":2},{"id":"clone-and-install","text":"Clone and install","level":2},{"id":"project-layout","text":"Project layout","level":2},{"id":"runtime-entry","text":"Runtime entry","level":3},{"id":"source-modules","text":"Source modules","level":3},{"id":"documentation-site","text":"Documentation site","level":3},{"id":"scripts","text":"Scripts","level":2},{"id":"esbuild-options","text":"esbuild options","level":3},{"id":"debug-in-extension-development-host","text":"Debug in Extension Development Host","level":2},{"id":"lint","text":"Lint","level":2},{"id":"package-a-vsix","text":"Package a VSIX","level":2},{"id":"what-is-excluded-from-the-package","text":"What is excluded from the package","level":3},{"id":"publish-maintainers","text":"Publish (maintainers)","level":2},{"id":"adding-features-pointers","text":"Adding features (pointers)","level":2},{"id":"new-builtin-completions","text":"New builtin completions","level":3},{"id":"new-snippets","text":"New snippets","level":3},{"id":"new-settings-commands","text":"New settings / commands","level":3},{"id":"grammar-language-config","text":"Grammar / language config","level":3},{"id":"library-memory-behavior","text":"Library memory behavior","level":3},{"id":"versioning","text":"Versioning","level":2},{"id":"tests","text":"Tests","level":2},{"id":"related-docs","text":"Related docs","level":2}],"plain":"Development\nGuide for building, debugging, packaging, and navigating the **Baan C VSCode** codebase.\nPrerequisites\nClone and install\ngit clone https://github.com/GABRYCA/baan-c-vscode.git\ncd baan-c-vscode\nnpm install\nProject layout\nbaan-c-support/          # repository root (name may vary locally)\n├── package.json         # extension manifest, contributes, scripts\n├── esbuild.js           # bundles src → dist/extension.js\n├── language-configuration.json\n├── syntaxes/\n│   └── baanc.tmLanguage.json\n├── snippets/\n│   └── baanc.json\n├── icons/               # marketplace + language icons\n├── src/\n│   ├── extension.js     # activation, providers, formatter, diagnostics\n│   ├── builtins.js      # ~980+ API + error constants\n│   ├── libraryMemory.js # learn / store / auto-import / manager UI\n│   └── test/            # tests / smoke helpers\n├── dist/\n│   └── extension.js     # bundled entry (runtime main)\n├── docs/                # markdown sources + generated index.html site\n├── scripts/\n│   └── build-docs.js    # builds docs/index.html from docs/*.md\n├── CHANGELOG.md\n├── README.md\n└── LICENSE\nRuntime entry\nSource modules\nThere is **no** separate language server process; all providers run in the extension host.\nDocumentation site\nMarkdown under `docs/*.md` is the source of truth. The professional SPA lives at `docs/index.html` (sidebar, search, light/dark theme). Regenerate after editing guides:\nnpm run docs:build\nOpen via **Baan C: Open Documentation** in the Command Palette, or open `docs/index.html` in a browser.\nScripts\nDefined in `package.json`:\nesbuild options\n`esbuild.js` builds:\nDebug in Extension Development Host\nOpen the repository folder in VS Code.\nRun `npm run compile` (or `npm run watch` in a terminal).\nPress **F5** or run the **Run Extension** launch configuration (`.vscode/launch.json`).\nA new **Extension Development Host** window opens with the extension loaded from the workspace.\nOpen a `.bc` file and exercise features.\nSet breakpoints in `src/*.js` (sourcemaps map into the bundle in non-production builds).\nReload the Extension Development Host (`Ctrl+R` / `Cmd+R`) after rebuilds if needed.\nLaunch config (simplified):\n{\n  \"name\": \"Run Extension\",\n  \"type\": \"extensionHost\",\n  \"request\": \"launch\",\n  \"args\": [\"--extensionDevelopmentPath=${workspaceFolder}\"]\n}\nLint\nnpm run lint\nESLint config: `eslint.config.mjs` (flat config). Scope: `src/`.\nPackage a VSIX\nnpm install\nnpx @vscode/vsce package\nThis will:\nRun `vscode:prepublish` → production esbuild\nPackage files according to `.vscodeignore`\nEmit something like `baan-c-vscode-1.0.6.vsix` in the project root\nInstall locally:\nCommand Palette → **Extensions: Install from VSIX…**\nSelect the generated file\nWhat is excluded from the package\n`.vscodeignore` omits (among other things):\n`src/**` (sources; only `dist/` is shipped)\n`node_modules/**`\n`.vscode/**`\nmaps, TypeScript, eslint config, esbuild script, quickstart notes\nShipped essentials: `package.json`, `dist/extension.js`, `syntaxes/`, `snippets/`, `language-configuration.json`, `icons/`, README/CHANGELOG/LICENSE as applicable.\nPublish (maintainers)\nTypical flow with `vsce` / Azure DevOps publisher account:\n# bump version in package.json, update CHANGELOG.md\nnpm run package          # or rely on prepublish\nnpx @vscode/vsce publish\nPublisher id in manifest: `AnonymousGCA`.   Extension name: `baan-c-vscode`.   Marketplace item: `AnonymousGCA.baan-c-vscode`.\nAlways update [CHANGELOG.md](../CHANGELOG.md) before a release.\nAdding features (pointers)\nNew builtin completions\nEdit `src/builtins.js` — append to `BUILTIN_FUNCTIONS`:\n{\n  name: 'my.api.call',\n  detail: 'long · short summary',\n  doc: '```baanc\\nlong my.api.call(...)\\n```\\nDescription.',\n  insert: 'my.api.call(${1:arg})$0'\n  // optional: dll: 'osome.object'  // only if truly required & known\n}\nNew snippets\nEdit `snippets/baanc.json` — VS Code snippet schema (`prefix`, `body`, `description`).\nNew settings / commands\nDeclare under `contributes.configuration` / `contributes.commands` in `package.json`.\nWire handlers in `src/extension.js` `activate()`.\nDocument in `docs/configuration.md` / `docs/commands.md` and CHANGELOG.\nGrammar / language config\nLibrary memory behavior\nAll learning, import edits, and manager UI live in `src/libraryMemory.js`. Keep import classification conservative; prefer manager overrides over aggressive guessing.\nVersioning\nCurrent version is read from `package.json` (`version` field). Documentation hub (`docs/README.md`) should stay aligned after releases.\nSuggested release checklist:\n[ ] `CHANGELOG.md` entry with date\n[ ] Version bump in `package.json`\n[ ] `npm run lint`\n[ ] Manual smoke test in Extension Development Host\n[ ] `npx @vscode/vsce package` and install smoke\n[ ] Publish (if applicable)\n[ ] Update docs version badge/table if present\nTests\nLightweight helpers live under `src/test/` (e.g. smoke for library memory). Expand coverage as features grow; there is no heavy CI suite required for basic packaging.\nRelated docs\n[Features](./features.md)\n[Configuration](./configuration.md)\n[Library memory](./library-memory.md)\n[Troubleshooting](./troubleshooting.md)"},"troubleshooting":{"id":"troubleshooting","title":"Troubleshooting","group":"Help","icon":"help","html":"<h1 id=\"troubleshooting\"><a class=\"anchor\" href=\"#troubleshooting\" aria-hidden=\"true\">#</a>Troubleshooting</h1>\n<p>Common issues, known limitations, and how to recover.</p>\n<hr />\n<h2 id=\"extension-does-not-activate\"><a class=\"anchor\" href=\"#extension-does-not-activate\" aria-hidden=\"true\">#</a>Extension does not activate</h2>\n<p><strong>Symptoms:</strong> no highlighting, no Baan completions, language mode wrong.</p>\n<p><strong>Checks:</strong></p>\n<ol>\n<li>File extension is <code>.bc</code>, <code>.cl</code>, <code>.bcl</code>, or <code>.script</code> — or language mode is manually set to <strong>Baan C</strong>.</li>\n<li>VS Code version ≥ <strong>1.125.0</strong>.</li>\n<li>Extension is enabled (Extensions view → Baan C VSCode → not disabled for this workspace).</li>\n<li>Reload window: Command Palette → <strong>Developer: Reload Window</strong>.</li>\n</ol>\n<p>Activation event is <code>onLanguage:baanc</code> only — the extension does not load until a Baan document is involved.</p>\n<hr />\n<h2 id=\"ln-still-opens-the-old-editor-not-vs-code\"><a class=\"anchor\" href=\"#ln-still-opens-the-old-editor-not-vs-code\" aria-hidden=\"true\">#</a>LN still opens the old editor (not VS Code)</h2>\n<p><strong>Checks:</strong></p>\n<ol>\n<li>VS Code is installed where LN expects it — typically <code>C:\\apps\\VSCODE\\Code.exe</code> (see <a href=\"#/getting-started#install-visual-studio-code\" data-route=\"getting-started\">Getting started</a>).</li>\n<li>Your LN user has <strong>Defaults → Development Parameters = VSCODE</strong> (see <a href=\"#/getting-started#set-vs-code-as-the-default-editor-in-ln\" data-route=\"getting-started\">Set VS Code as the default editor in LN</a>).</li>\n<li>If <strong>VSCODE</strong> is missing from the zoom list, create the development-parameter entry, save it, then select it on your user and save again.</li>\n<li>Log out/in of LNUI (or restart the session) after changing Development Parameters.</li>\n<li>Confirm with your LN administrator that the <strong>VSCODE</strong> parameter points at the correct <code>Code.exe</code> path for your site.</li>\n</ol>\n<hr />\n<h2 id=\"completions-missing-builtins-or-errors\"><a class=\"anchor\" href=\"#completions-missing-builtins-or-errors\" aria-hidden=\"true\">#</a>Completions missing builtins or errors</h2>\n<ol>\n<li>Confirm settings:</li>\n</ol>\n<p>``<code>json    {      &quot;baanc.completion.includeBuiltins&quot;: true,      &quot;baanc.completion.includeErrors&quot;: true    }    </code>``</p>\n<ol>\n<li>Ensure you are not inside a comment or string (quick suggestions are off there by default).</li>\n<li>Trigger manually: <code>Ctrl+Space</code> / <code>Ctrl+Space</code> (macOS: <code>Ctrl+Space</code>).</li>\n<li>If only <strong>library</strong> APIs are missing, open the library <code>.bc</code> once so <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a> can learn them.</li>\n</ol>\n<hr />\n<h2 id=\"snippet-inserts-define-or-odd-duplication\"><a class=\"anchor\" href=\"#snippet-inserts-define-or-odd-duplication\" aria-hidden=\"true\">#</a>Snippet inserts <code>##define</code> or odd <code>#</code> duplication</h2>\n<p>This was fixed in <strong>1.0.2</strong>. Preprocessor completions replace a partially typed <code>#…</code> prefix.</p>\n<p>If you still see doubles:</p>\n<ul>\n<li>Update to the latest extension version.</li>\n<li>Prefer snippet prefixes (<code>define</code>, <code>#define</code>) from the extension, not outdated user snippets that hardcode an extra <code>#</code>.</li>\n</ul>\n<hr />\n<h2 id=\"dotted-4gl-sections-stop-completing-after-typing-.\"><a class=\"anchor\" href=\"#dotted-4gl-sections-stop-completing-after-typing-.\" aria-hidden=\"true\">#</a>Dotted 4GL sections stop completing after typing <code>.</code></h2>\n<p>Fixed in <strong>1.0.2</strong> for cases like <code>before.</code>. Update if you are on an older build.   4GL names are registered as single completion units so the dotted form keeps matching.</p>\n<hr />\n<h2 id=\"format-does-not-align-sql-the-way-i-expect\"><a class=\"anchor\" href=\"#format-does-not-align-sql-the-way-i-expect\" aria-hidden=\"true\">#</a>Format does not align SQL the way I expect</h2>\n<ul>\n<li>Use <strong>Baan C: Format Document</strong> or <code>Shift+Alt+F</code> (not only generic formatters from other extensions).</li>\n<li>Ensure the language id is <code>baanc</code>.</li>\n<li>Check <code>baanc.indentSize</code> matches your <code>editor.tabSize</code> for <code>[baanc]</code>.</li>\n<li>Clause alignment targets standard embedded SQL keywords (<code>select</code>, <code>from</code>, <code>where</code>, <code>and</code>, <code>or</code>, <code>order by</code>, …). Highly unusual layouts may need a second manual pass.</li>\n</ul>\n<hr />\n<h2 id=\"diagnostics-false-positives-in-comments-or-macros\"><a class=\"anchor\" href=\"#diagnostics-false-positives-in-comments-or-macros\" aria-hidden=\"true\">#</a>Diagnostics false positives in comments or macros</h2>\n<ul>\n<li>Keep <code>baanc.diagnostics.strictComments: true</code> so <code>|</code> and <code>/* */</code> are ignored for block analysis.</li>\n<li>Advanced macros that open/close blocks across files can confuse structural analysis (known limitation).</li>\n<li>Temporarily disable with <code>baanc.diagnostics.enabled: false</code> if needed for a specific file.</li>\n</ul>\n<hr />\n<h2 id=\"naming-hints-are-noisy\"><a class=\"anchor\" href=\"#naming-hints-are-noisy\" aria-hidden=\"true\">#</a>Naming hints are noisy</h2>\n<p>Naming diagnostics are <strong>Hint</strong> severity by design.</p>\n<div class=\"code-block\" data-lang=\"json\"><div class=\"code-head\"><span class=\"code-lang\">json</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;baanc.diagnostics.namingConventions&quot;: false,\n  &quot;baanc.diagnostics.namingArgPrefixes&quot;: false\n}</code></pre></div>\n<p>Or leave conventions on and keep <code>namingArgPrefixes</code> off (default) to avoid <code>i.</code>/<code>o.</code>/<code>io.</code> noise.</p>\n<hr />\n<h2 id=\"rename-find-references-missed-other-files\"><a class=\"anchor\" href=\"#rename-find-references-missed-other-files\" aria-hidden=\"true\">#</a>Rename / Find References missed other files</h2>\n<p><strong>Expected.</strong> These features operate on the <strong>current file only</strong>. There is no workspace-wide symbol index.</p>\n<p>For cross-script APIs:</p>\n<ul>\n<li>Use Library memory + completions for discovery.</li>\n<li>Use VS Code workspace search (<code>Ctrl+Shift+F</code>) for text-level multi-file search.</li>\n</ul>\n<hr />\n<h2 id=\"auto-import-inserted-the-wrong-form-include-vs-pragma\"><a class=\"anchor\" href=\"#auto-import-inserted-the-wrong-form-include-vs-pragma\" aria-hidden=\"true\">#</a>Auto-import inserted the wrong form (<code>#include</code> vs <code>#pragma</code>)</h2>\n<ol>\n<li>Open <strong>Baan C: Manage Memorized Libraries…</strong></li>\n<li>Select the library and switch import kind.</li>\n<li>Remove a bad entry and re-open the source file so it is re-learned with a clearer name (<code>*dll*</code> → pragma; classic <code>i…</code> includes → <code>#include</code>).</li>\n</ol>\n<p>Heuristics are documented in <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a>.</p>\n<hr />\n<h2 id=\"auto-import-did-not-run\"><a class=\"anchor\" href=\"#auto-import-did-not-run\" aria-hidden=\"true\">#</a>Auto-import did not run</h2>\n<p>Check:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Should be</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.libraryMemory.enabled</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.autoImportOnCompletion</code></td>\n<td><code>true</code> (for memorized APIs)</td>\n</tr>\n<tr>\n<td><code>baanc.autoImport.builtinsOnCompletion</code></td>\n<td><code>true</code> (only for <strong>mapped</strong> builtins)</td>\n</tr>\n</tbody></table></div>\n<p>Also:</p>\n<ul>\n<li>The library must already be memorized (open it once).</li>\n<li>Accept the <strong>memorized</strong> completion item, not a plain word-based suggestion.</li>\n<li>Import may already be present under an alternate <code>o</code> / path form (treated as present).</li>\n</ul>\n<hr />\n<h2 id=\"library-memory-empty-or-stale\"><a class=\"anchor\" href=\"#library-memory-empty-or-stale\" aria-hidden=\"true\">#</a>Library memory empty or stale</h2>\n<ol>\n<li>Open the library/include <code>.bc</code> again and wait briefly (learn is debounced).</li>\n<li>Confirm language id is <code>baanc</code> and scheme is <code>file</code> or <code>untitled</code> with a usable name.</li>\n<li><strong>Manage Memorized Libraries…</strong> to inspect what is stored.</li>\n<li><strong>Clear Memorized Libraries</strong> if the store is polluted, then re-open sources.</li>\n</ol>\n<p>Memory is global to the VS Code profile — not per workspace folder.</p>\n<hr />\n<h2 id=\"builtin-pragma-inserted-for-a-function-that-does-not-need-a-dll\"><a class=\"anchor\" href=\"#builtin-pragma-inserted-for-a-function-that-does-not-need-a-dll\" aria-hidden=\"true\">#</a>Builtin pragma inserted for a function that does not need a DLL</h2>\n<p>Builtin DLL mappings are meant to be rare. If one is wrong for your LN install:</p>\n<ul>\n<li>Turn off <code>baanc.autoImport.builtinsOnCompletion</code> and <code>baanc.autoImport.builtinImportHints</code>.</li>\n<li>Or delete the inserted pragma manually; prefer library memory for real DLL sources from your environment.</li>\n</ul>\n<hr />\n<h2 id=\"extension-development-host-shows-old-code\"><a class=\"anchor\" href=\"#extension-development-host-shows-old-code\" aria-hidden=\"true\">#</a>Extension Development Host shows old code</h2>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\">npm run compile\n# or leave npm run watch running</code></pre></div>\n<p>Then reload the Extension Development Host window. Ensure you are not packaging/running a stale <code>.vsix</code> while developing from source.</p>\n<hr />\n<h2 id=\"packaging-install-from-vsix-fails\"><a class=\"anchor\" href=\"#packaging-install-from-vsix-fails\" aria-hidden=\"true\">#</a>Packaging / install from VSIX fails</h2>\n<ol>\n<li><code>npm install</code> then <code>npx @vscode/vsce package</code> from the repo root.</li>\n<li>Confirm <code>dist/extension.js</code> exists after prepublish.</li>\n<li>Install via <strong>Extensions: Install from VSIX…</strong> (not by unzipping).</li>\n<li>If an older version is stuck, uninstall it first, then install the new VSIX.</li>\n</ol>\n<hr />\n<h2 id=\"known-limitations-summary\"><a class=\"anchor\" href=\"#known-limitations-summary\" aria-hidden=\"true\">#</a>Known limitations (summary)</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Limitation</th>\n<th>Notes</th>\n</tr></thead><tbody>\n<tr>\n<td>Single-file references/rename</td>\n<td>No workspace symbol database</td>\n</tr>\n<tr>\n<td>Macro-heavy multi-file blocks</td>\n<td>Structural diagnostics may mis-fire</td>\n</tr>\n<tr>\n<td>Import kind heuristics</td>\n<td>Override in Manage Memorized Libraries</td>\n</tr>\n<tr>\n<td>Builtin DLL map sparse</td>\n<td>By design — no aggressive guessing</td>\n</tr>\n<tr>\n<td>No external LSP</td>\n<td>All logic runs in the extension host</td>\n</tr>\n<tr>\n<td>BECS temp names</td>\n<td>Unusual names may need manual import / kind fix</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"getting-help\"><a class=\"anchor\" href=\"#getting-help\" aria-hidden=\"true\">#</a>Getting help</h2>\n<ul>\n<li>Review <a href=\"#/features\" data-route=\"features\">Features</a> and <a href=\"#/configuration\" data-route=\"configuration\">Configuration</a></li>\n<li>Check <a href=\"../CHANGELOG.md\" class=\"ext-link\">CHANGELOG.md</a> for behavior changes by version</li>\n<li>Open an issue on the repository: https://github.com/GABRYCA/baan-c-vscode</li>\n</ul>\n<p>When filing a bug, include:</p>\n<ul>\n<li>Extension version (<code>package.json</code> / marketplace version)</li>\n<li>VS Code version</li>\n<li>Minimal <code>.bc</code> sample (sanitized)</li>\n<li>Relevant <code>baanc.*</code> settings</li>\n<li>Whether BECS / temp files are involved</li>\n</ul>","toc":[{"id":"extension-does-not-activate","text":"Extension does not activate","level":2},{"id":"ln-still-opens-the-old-editor-not-vs-code","text":"LN still opens the old editor (not VS Code)","level":2},{"id":"completions-missing-builtins-or-errors","text":"Completions missing builtins or errors","level":2},{"id":"snippet-inserts-define-or-odd-duplication","text":"Snippet inserts ##define or odd # duplication","level":2},{"id":"dotted-4gl-sections-stop-completing-after-typing-.","text":"Dotted 4GL sections stop completing after typing .","level":2},{"id":"format-does-not-align-sql-the-way-i-expect","text":"Format does not align SQL the way I expect","level":2},{"id":"diagnostics-false-positives-in-comments-or-macros","text":"Diagnostics false positives in comments or macros","level":2},{"id":"naming-hints-are-noisy","text":"Naming hints are noisy","level":2},{"id":"rename-find-references-missed-other-files","text":"Rename / Find References missed other files","level":2},{"id":"auto-import-inserted-the-wrong-form-include-vs-pragma","text":"Auto-import inserted the wrong form (#include vs #pragma)","level":2},{"id":"auto-import-did-not-run","text":"Auto-import did not run","level":2},{"id":"library-memory-empty-or-stale","text":"Library memory empty or stale","level":2},{"id":"builtin-pragma-inserted-for-a-function-that-does-not-need-a-dll","text":"Builtin pragma inserted for a function that does not need a DLL","level":2},{"id":"extension-development-host-shows-old-code","text":"Extension Development Host shows old code","level":2},{"id":"packaging-install-from-vsix-fails","text":"Packaging / install from VSIX fails","level":2},{"id":"known-limitations-summary","text":"Known limitations (summary)","level":2},{"id":"getting-help","text":"Getting help","level":2}],"plain":"Troubleshooting\nCommon issues, known limitations, and how to recover.\nExtension does not activate\n**Symptoms:** no highlighting, no Baan completions, language mode wrong.\n**Checks:**\nFile extension is `.bc`, `.cl`, `.bcl`, or `.script` — or language mode is manually set to **Baan C**.\nVS Code version ≥ **1.125.0**.\nExtension is enabled (Extensions view → Baan C
