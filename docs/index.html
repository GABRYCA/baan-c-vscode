VSCode → not disabled for this workspace).\nReload window: Command Palette → **Developer: Reload Window**.\nActivation event is `onLanguage:baanc` only — the extension does not load until a Baan document is involved.\nLN still opens the old editor (not VS Code)\n**Checks:**\nVS Code is installed where LN expects it — typically `C:\\apps\\VSCODE\\Code.exe` (see [Getting started](./getting-started.md#install-visual-studio-code)).\nYour LN user has **Defaults → Development Parameters = VSCODE** (see [Set VS Code as the default editor in LN](./getting-started.md#set-vs-code-as-the-default-editor-in-ln)).\nIf **VSCODE** is missing from the zoom list, create the development-parameter entry, save it, then select it on your user and save again.\nLog out/in of LNUI (or restart the session) after changing Development Parameters.\nConfirm with your LN administrator that the **VSCODE** parameter points at the correct `Code.exe` path for your site.\nCompletions missing builtins or errors\nConfirm settings:\n```json    {      \"baanc.completion.includeBuiltins\": true,      \"baanc.completion.includeErrors\": true    }    ```\nEnsure you are not inside a comment or string (quick suggestions are off there by default).\nTrigger manually: `Ctrl+Space` / `Ctrl+Space` (macOS: `Ctrl+Space`).\nIf only **library** APIs are missing, open the library `.bc` once so [Library memory](./library-memory.md) can learn them.\nSnippet inserts `##define` or odd `#` duplication\nThis was fixed in **1.0.2**. Preprocessor completions replace a partially typed `#…` prefix.\nIf you still see doubles:\nUpdate to the latest extension version.\nPrefer snippet prefixes (`define`, `#define`) from the extension, not outdated user snippets that hardcode an extra `#`.\nDotted 4GL sections stop completing after typing `.`\nFixed in **1.0.2** for cases like `before.`. Update if you are on an older build.   4GL names are registered as single completion units so the dotted form keeps matching.\nFormat does not align SQL the way I expect\nUse **Baan C: Format Document** or `Shift+Alt+F` (not only generic formatters from other extensions).\nEnsure the language id is `baanc`.\nCheck `baanc.indentSize` matches your `editor.tabSize` for `[baanc]`.\nClause alignment targets standard embedded SQL keywords (`select`, `from`, `where`, `and`, `or`, `order by`, …). Highly unusual layouts may need a second manual pass.\nDiagnostics false positives in comments or macros\nKeep `baanc.diagnostics.strictComments: true` so `|` and `/* */` are ignored for block analysis.\nAdvanced macros that open/close blocks across files can confuse structural analysis (known limitation).\nTemporarily disable with `baanc.diagnostics.enabled: false` if needed for a specific file.\nNaming hints are noisy\nNaming diagnostics are **Hint** severity by design.\n{\n  \"baanc.diagnostics.namingConventions\": false,\n  \"baanc.diagnostics.namingArgPrefixes\": false\n}\nOr leave conventions on and keep `namingArgPrefixes` off (default) to avoid `i.`/`o.`/`io.` noise.\nRename / Find References missed other files\n**Expected.** These features operate on the **current file only**. There is no workspace-wide symbol index.\nFor cross-script APIs:\nUse Library memory + completions for discovery.\nUse VS Code workspace search (`Ctrl+Shift+F`) for text-level multi-file search.\nAuto-import inserted the wrong form (`#include` vs `#pragma`)\nOpen **Baan C: Manage Memorized Libraries…**\nSelect the library and switch import kind.\nRemove a bad entry and re-open the source file so it is re-learned with a clearer name (`*dll*` → pragma; classic `i…` includes → `#include`).\nHeuristics are documented in [Library memory](./library-memory.md).\nAuto-import did not run\nCheck:\nAlso:\nThe library must already be memorized (open it once).\nAccept the **memorized** completion item, not a plain word-based suggestion.\nImport may already be present under an alternate `o` / path form (treated as present).\nLibrary memory empty or stale\nOpen the library/include `.bc` again and wait briefly (learn is debounced).\nConfirm language id is `baanc` and scheme is `file` or `untitled` with a usable name.\n**Manage Memorized Libraries…** to inspect what is stored.\n**Clear Memorized Libraries** if the store is polluted, then re-open sources.\nMemory is global to the VS Code profile — not per workspace folder.\nBuiltin pragma inserted for a function that does not need a DLL\nBuiltin DLL mappings are meant to be rare. If one is wrong for your LN install:\nTurn off `baanc.autoImport.builtinsOnCompletion` and `baanc.autoImport.builtinImportHints`.\nOr delete the inserted pragma manually; prefer library memory for real DLL sources from your environment.\nExtension Development Host shows old code\nnpm run compile\n# or leave npm run watch running\nThen reload the Extension Development Host window. Ensure you are not packaging/running a stale `.vsix` while developing from source.\nPackaging / install from VSIX fails\n`npm install` then `npx @vscode/vsce package` from the repo root.\nConfirm `dist/extension.js` exists after prepublish.\nInstall via **Extensions: Install from VSIX…** (not by unzipping).\nIf an older version is stuck, uninstall it first, then install the new VSIX.\nKnown limitations (summary)\nGetting help\nReview [Features](./features.md) and [Configuration](./configuration.md)\nCheck [CHANGELOG.md](../CHANGELOG.md) for behavior changes by version\nOpen an issue on the repository: https://github.com/GABRYCA/baan-c-vscode\nWhen filing a bug, include:\nExtension version (`package.json` / marketplace version)\nVS Code version\nMinimal `.bc` sample (sanitized)\nRelevant `baanc.*` settings\nWhether BECS / temp files are involved"}};
  var ORDER = ["overview","getting-started","features","configuration","commands","snippets","library-memory","development","troubleshooting"];

  var article = document.getElementById('article');
  var tocLinks = document.getElementById('toc-links');
  var breadcrumbs = document.getElementById('breadcrumbs');
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebar-overlay');
  var searchModal = document.getElementById('search-modal');
  var searchInput = document.getElementById('search-input');
  var searchResults = document.getElementById('search-results');
  var currentId = '';
  var activeHit = -1;

  // Theme (never throw — a failure here must not block content rendering)
  function getPreferredTheme() {
    try {
      var stored = localStorage.getItem('baanc-docs-theme');
      if (stored === 'light' || stored === 'dark') return stored;
    } catch (e) {}
    try {
      if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
        return 'light';
      }
    } catch (e2) {}
    return 'dark';
  }
  function applyTheme(theme) {
    try {
      document.documentElement.setAttribute('data-theme', theme || 'dark');
      localStorage.setItem('baanc-docs-theme', theme || 'dark');
    } catch (e) {
      try { document.documentElement.setAttribute('data-theme', theme || 'dark'); } catch (e2) {}
    }
  }
  applyTheme(getPreferredTheme());
  var themeBtn = document.getElementById('theme-btn');
  if (themeBtn) {
    themeBtn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    });
  }

  // Sidebar mobile
  function openSidebar() {
    sidebar.classList.add('open');
    overlay.hidden = false;
    overlay.classList.add('open');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    overlay.hidden = true;
  }
  document.getElementById('menu-btn').addEventListener('click', openSidebar);
  overlay.addEventListener('click', closeSidebar);

  /**
   * VS Code webviews do not reliably fire hashchange or honor location.hash
   * navigation. We keep an in-memory route and call renderPage() directly.
   */
  var routeState = { id: 'overview', anchor: '' };

  function parseRouteString(raw) {
    var routePart = 'overview';
    var anchor = '';
    if (!raw) {
      return { id: 'overview', anchor: '' };
    }
    var full = String(raw).replace(/^#/, '');
    if (full.charAt(0) === '/') {
      full = full.slice(1);
    }
    // forms: "features", "features#section", "/features#section"
    var hashPos = full.indexOf('#');
    if (hashPos >= 0) {
      routePart = full.slice(0, hashPos) || 'overview';
      anchor = full.slice(hashPos + 1);
    } else {
      routePart = full.split('?')[0] || 'overview';
    }
    // strip accidental leading slashes (avoid /…/ regex in this template literal)
    while (routePart.charAt(0) === '/') {
      routePart = routePart.slice(1);
    }
    if (!PAGES[routePart]) {
      // bare heading id on current page
      if (document.getElementById(routePart)) {
        return { id: routeState.id || 'overview', anchor: routePart };
      }
      routePart = 'overview';
    }
    return { id: routePart, anchor: anchor };
  }

  function parseHash() {
    try {
      return parseRouteString(location.hash || '');
    } catch (e) {
      return { id: routeState.id || 'overview', anchor: '' };
    }
  }

  function setHashQuiet(id, anchor) {
    var next = '#/' + id + (anchor ? '#' + anchor : '');
    try {
      if (history && history.replaceState) {
        history.replaceState(null, '', next);
      } else {
        location.hash = next;
      }
    } catch (e) {
      // Webview may block history API — ignore; routeState is source of truth
    }
  }

  /** Navigate to a page (and optional heading). Works in browser and VS Code webview. */
  function navigate(id, anchor, opts) {
    opts = opts || {};
    if (!PAGES[id]) {
      id = 'overview';
    }
    routeState = { id: id, anchor: anchor || '' };
    if (!opts.skipHash) {
      setHashQuiet(id, anchor);
    }
    renderPage(id, anchor);
  }

  function setActiveNav(id) {
    document.querySelectorAll('.nav-link').forEach(function (el) {
      el.classList.toggle('active', el.getAttribute('data-route') === id);
    });
  }

  function renderToc(page) {
    tocLinks.innerHTML = '';
    if (!page.toc || !page.toc.length) {
      tocLinks.innerHTML = '<div class="search-empty" style="padding:0">No sections</div>';
      return;
    }
    page.toc.forEach(function (item) {
      var a = document.createElement('a');
      a.href = '#/' + page.id + '#' + item.id;
      a.setAttribute('data-route', page.id);
      a.setAttribute('data-anchor', item.id);
      a.textContent = item.text;
      a.className = 'depth-' + item.level;
      a.dataset.toc = item.id;
      tocLinks.appendChild(a);
    });
  }

  function renderPager(id) {
    var idx = ORDER.indexOf(id);
    var prev = idx > 0 ? PAGES[ORDER[idx - 1]] : null;
    var next = idx < ORDER.length - 1 ? PAGES[ORDER[idx + 1]] : null;
    var html = '<nav class="pager" aria-label="Page navigation">';
    if (prev) {
      html += '<a class="prev" href="#/' + prev.id + '" data-route="' + prev.id + '"><span class="label">← Previous</span><span class="title">' + escapeHtml(prev.title) + '</span></a>';
    } else {
      html += '<span class="disabled"></span>';
    }
    if (next) {
      html += '<a class="next" href="#/' + next.id + '" data-route="' + next.id + '"><span class="label">Next →</span><span class="title">' + escapeHtml(next.title) + '</span></a>';
    } else {
      html += '<span class="disabled"></span>';
    }
    html += '</nav>';
    return html;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function wireCopyButtons(root) {
    root.querySelectorAll('.copy-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var pre = btn.closest('.code-block').querySelector('code');
        var text = pre ? pre.textContent : '';
        function done() {
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 1500);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done).catch(function () {
            fallbackCopy(text); done();
          });
        } else {
          fallbackCopy(text); done();
        }
      });
    });
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
  }

  function afterPaint(fn) {
    if (typeof requestAnimationFrame === 'function') {
      requestAnimationFrame(fn);
    } else {
      setTimeout(fn, 0);
    }
  }

  function renderPage(id, anchor) {
    var page = PAGES[id] || PAGES.overview;
    if (!page) {
      if (article) article.innerHTML = '<p>Page not found.</p>';
      return;
    }
    currentId = page.id;
    try {
      document.title = page.title + ' · Baan C VSCode Docs';
    } catch (e) {}
    if (breadcrumbs) {
      breadcrumbs.innerHTML = '<span>Docs</span> / <strong>' + escapeHtml(page.title) + '</strong>';
    }
    setActiveNav(page.id);
    try { renderToc(page); } catch (e) {}

    if (!article) {
      return;
    }
    // Content first — never let post-render hooks wipe a successful paint
    article.innerHTML =
      '<div class="page-meta"><span class="page-badge">' + escapeHtml(page.group) + '</span></div>' +
      (page.html || '') +
      renderPager(page.id);

    try { wireCopyButtons(article); } catch (e) {}
    try { closeSidebar(); } catch (e) {}
    try { setupTocSpy(); } catch (e) {}

    afterPaint(function () {
      try {
        if (anchor) {
          var el = document.getElementById(anchor);
          if (el) {
            el.scrollIntoView();
            return;
          }
        }
        window.scrollTo(0, 0);
      } catch (e) {}
    });
  }

  // TOC spy
  var tocObserver = null;
  function setupTocSpy() {
    if (tocObserver) tocObserver.disconnect();
    var headings = article.querySelectorAll('h2[id], h3[id]');
    if (!headings.length) return;
    tocObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        tocLinks.querySelectorAll('a').forEach(function (a) {
          a.classList.toggle('active', a.dataset.toc === entry.target.id);
        });
      });
    }, { rootMargin: '-20% 0px -70% 0px', threshold: 0 });
    headings.forEach(function (h) { tocObserver.observe(h); });
  }

  function onRoute() {
    var r = parseHash();
    routeState = r;
    renderPage(r.id, r.anchor);
  }

  /**
   * Capture all internal navigation. Do not rely on hashchange — VS Code webviews
   * often swallow or ignore hash-only navigations on <a href="#/...">.
   */
  document.addEventListener('click', function (e) {
    // Ignore modified clicks (new tab, etc.)
    if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) {
      return;
    }
    var a = e.target.closest && e.target.closest('a');
    if (!a || a.target === '_blank') {
      return;
    }

    var routeAttr = a.getAttribute('data-route');
    var anchorAttr = a.getAttribute('data-anchor') || '';
    if (routeAttr && PAGES[routeAttr]) {
      e.preventDefault();
      e.stopPropagation();
      navigate(routeAttr, anchorAttr);
      return;
    }

    var href = a.getAttribute('href') || '';
    if (!href || href === '#') {
      return;
    }

    // External http(s) — let webview / browser handle (or open)
    if (href.indexOf('http://') === 0 || href.indexOf('https://') === 0 || href.indexOf('mailto:') === 0) {
      return;
    }

    // SPA routes: #/page, #/page#section, /#/page
    if (href.charAt(0) === '#' || href.indexOf('#/') >= 0) {
      var parsed = parseRouteString(href.indexOf('#') >= 0 ? href.slice(href.indexOf('#')) : href);
      if (PAGES[parsed.id] || parsed.anchor) {
        e.preventDefault();
        e.stopPropagation();
        if (parsed.anchor && parsed.id === currentId && document.getElementById(parsed.anchor)) {
          navigate(parsed.id, parsed.anchor);
        } else if (PAGES[parsed.id]) {
          navigate(parsed.id, parsed.anchor);
        } else if (parsed.anchor && document.getElementById(parsed.anchor)) {
          navigate(currentId || 'overview', parsed.anchor);
        }
      }
      return;
    }

    // Relative ./foo.md style (rewritten at build) — already data-route usually
    // In-page heading only
    if (href.charAt(0) === '#' && href.charAt(1) !== '/') {
      var hid = href.slice(1);
      if (document.getElementById(hid)) {
        e.preventDefault();
        navigate(currentId || 'overview', hid);
      }
    }
  }, true);

  // Browser-only fallback when user uses back/forward
  window.addEventListener('hashchange', function () {
    var r = parseHash();
    if (r.id !== routeState.id || r.anchor !== routeState.anchor) {
      routeState = r;
      renderPage(r.id, r.anchor);
    }
  });

  // VS Code webview host may post navigate messages
  window.addEventListener('message', function (event) {
    var msg = event.data;
    if (!msg || msg.type !== 'navigate') return;
    if (msg.route && PAGES[msg.route]) {
      navigate(msg.route, msg.anchor || '');
    }
  });

  // Search
  function openSearch() {
    searchModal.classList.add('open');
    searchInput.value = '';
    searchResults.innerHTML = '<div class="search-empty">Type to search across all pages…</div>';
    activeHit = -1;
    setTimeout(function () { searchInput.focus(); }, 10);
  }
  function closeSearch() {
    searchModal.classList.remove('open');
    searchInput.blur();
  }
  document.getElementById('open-search').addEventListener('click', openSearch);
  searchModal.addEventListener('click', function (e) {
    if (e.target === searchModal) closeSearch();
  });

  function searchDocs(q) {
    q = q.trim().toLowerCase();
    if (!q) {
      searchResults.innerHTML = '<div class="search-empty">Type to search across all pages…</div>';
      activeHit = -1;
      return;
    }
    var hits = [];
    ORDER.forEach(function (id) {
      var page = PAGES[id];
      var plain = page.plain || '';
      var lines = plain.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        var idx = line.toLowerCase().indexOf(q);
        if (idx >= 0) {
          hits.push({ id: page.id, title: page.title, line: line, idx: idx });
          if (hits.filter(function (h) { return h.id === page.id; }).length >= 3) break;
        }
      }
      // also match title
      if (page.title.toLowerCase().indexOf(q) >= 0 && !hits.some(function (h) { return h.id === page.id && h.line === page.title; })) {
        hits.unshift({ id: page.id, title: page.title, line: page.title + ' — open page', idx: 0 });
      }
    });
    hits = hits.slice(0, 20);
    if (!hits.length) {
      searchResults.innerHTML = '<div class="search-empty">No results for “' + escapeHtml(q) + '”</div>';
      activeHit = -1;
      return;
    }
    searchResults.innerHTML = hits.map(function (h, i) {
      var line = h.line || '';
      var low = line.toLowerCase();
      var qi = low.indexOf(q);
      var snip;
      if (qi >= 0) {
        snip = escapeHtml(line.slice(0, qi)) +
          '<mark>' + escapeHtml(line.slice(qi, qi + q.length)) + '</mark>' +
          escapeHtml(line.slice(qi + q.length));
      } else {
        snip = escapeHtml(line);
      }
      return '<button type="button" class="search-hit" data-route="' + h.id + '" data-idx="' + i + '">' +
        '<div class="hit-page">' + escapeHtml(h.title) + '</div>' +
        '<div class="hit-snippet">' + snip + '</div></button>';
    }).join('');
    activeHit = 0;
    highlightHit();
  }

  function highlightHit() {
    var nodes = searchResults.querySelectorAll('.search-hit');
    nodes.forEach(function (n, i) {
      n.classList.toggle('active', i === activeHit);
    });
    if (nodes[activeHit]) nodes[activeHit].scrollIntoView({ block: 'nearest' });
  }

  searchInput.addEventListener('input', function () {
    searchDocs(searchInput.value);
  });

  searchResults.addEventListener('click', function (e) {
    var hit = e.target.closest('.search-hit');
    if (!hit) return;
    navigate(hit.getAttribute('data-route'));
    closeSearch();
  });

  document.addEventListener('keydown', function (e) {
    var isMod = e.ctrlKey || e.metaKey;
    if (isMod && e.key.toLowerCase() === 'k') {
      e.preventDefault();
      if (searchModal.classList.contains('open')) closeSearch();
      else openSearch();
      return;
    }
    if (e.key === 'Escape') {
      if (searchModal.classList.contains('open')) closeSearch();
      else closeSidebar();
      return;
    }
    if (!searchModal.classList.contains('open')) return;
    var nodes = searchResults.querySelectorAll('.search-hit');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (!nodes.length) return;
      activeHit = Math.min(nodes.length - 1, activeHit + 1);
      highlightHit();
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (!nodes.length) return;
      activeHit = Math.max(0, activeHit - 1);
      highlightHit();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (nodes[activeHit]) {
        navigate(nodes[activeHit].getAttribute('data-route'));
        closeSearch();
      }
    }
  });

  // Update kbd hint for Mac
  if ((navigator.platform || '').indexOf('Mac') >= 0 || (navigator.platform || '').indexOf('iPhone') >= 0 || (navigator.platform || '').indexOf('iPad') >= 0) {
    document.querySelectorAll('.search-trigger kbd').forEach(function (k) {
      k.textContent = '⌘ K';
    });
  }

  // Boot — prefer explicit start route injected by webview host, else hash, else overview
  var bootRoute = (typeof window.__BAANC_DOCS_START__ === 'string' && window.__BAANC_DOCS_START__)
    ? window.__BAANC_DOCS_START__
    : '';
  if (bootRoute && PAGES[bootRoute]) {
    navigate(bootRoute, '', { skipHash: false });
  } else if (location.hash && location.hash !== '#') {
    onRoute();
  } else {
    navigate('overview');
  }
})();
  </script>
</body>
</html>
