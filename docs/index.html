<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Documentation for Baan C VSCode — language support for Baan C / Infor LN in Visual Studio Code." />
  <title>Baan C VSCode Documentation</title>
  <style>
/* ── Reset & tokens ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
  background: var(--bg);
  min-height: 100vh;
}
:root, [data-theme="dark"] {
  --bg: #0b0f14;
  --bg-elevated: #111820;
  --bg-sidebar: #0d1219;
  --bg-code: #0a0e13;
  --bg-hover: rgba(125, 180, 255, 0.08);
  --bg-active: rgba(56, 139, 253, 0.15);
  --border: #1e2a38;
  --border-subtle: #16202b;
  --text: #e6edf3;
  --text-muted: #8b9cb3;
  --text-faint: #5c6b80;
  --accent: #3b9eff;
  --accent-soft: #58a6ff;
  --accent-dim: rgba(59, 158, 255, 0.2);
  --link: #6cb6ff;
  --success: #3fb950;
  --warning: #d29922;
  --danger: #f85149;
  --code-text: #e6edf3;
  --shadow: 0 8px 30px rgba(0,0,0,0.35);
  --radius: 10px;
  --sidebar-w: 280px;
  --toc-w: 220px;
  --header-h: 56px;
  --font-mono: "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, "Courier New", monospace;
  --selection: rgba(59, 158, 255, 0.28);
}
[data-theme="light"] {
  --bg: #f7f9fc;
  --bg-elevated: #ffffff;
  --bg-sidebar: #ffffff;
  --bg-code: #f0f4f8;
  --bg-hover: rgba(9, 105, 218, 0.06);
  --bg-active: rgba(9, 105, 218, 0.1);
  --border: #d8e0ea;
  --border-subtle: #e8eef5;
  --text: #1a2332;
  --text-muted: #5b6b7c;
  --text-faint: #8a97a8;
  --accent: #0969da;
  --accent-soft: #218bff;
  --accent-dim: rgba(9, 105, 218, 0.12);
  --link: #0969da;
  --code-text: #1a2332;
  --shadow: 0 8px 30px rgba(16, 24, 40, 0.08);
  --selection: rgba(9, 105, 218, 0.18);
}
::selection { background: var(--selection); }
a { color: var(--link); text-decoration: none; }
a:hover { text-decoration: underline; }
img { max-width: 100%; height: auto; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ── Layout ─────────────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: 100vh;
}
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 40;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border-subtle);
  text-decoration: none;
  color: var(--text);
}
.sidebar-brand:hover { text-decoration: none; }
.brand-mark {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: linear-gradient(145deg, #1a6fd4 0%, #0d3d7a 100%);
  display: grid;
  place-items: center;
  color: #fff;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: -0.02em;
  box-shadow: 0 2px 8px rgba(26, 111, 212, 0.35);
  flex-shrink: 0;
}
.brand-text { min-width: 0; }
.brand-title {
  font-weight: 650;
  font-size: 14.5px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-sub {
  font-size: 11.5px;
  color: var(--text-muted);
  margin-top: 2px;
}
.sidebar-search {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-subtle);
}
.search-trigger {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  font-size: 13px;
  transition: border-color 0.15s, background 0.15s;
}
.search-trigger:hover {
  border-color: var(--accent);
  background: var(--bg-hover);
}
.search-trigger kbd {
  margin-left: auto;
  font-family: inherit;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-faint);
}
.sidebar-nav {
  flex: 1;
  padding: 12px 10px 24px;
  overflow-y: auto;
}
.nav-group { margin-bottom: 18px; }
.nav-group-title {
  font-size: 11px;
  font-weight: 650;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  padding: 4px 10px 8px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13.5px;
  font-weight: 500;
  margin-bottom: 2px;
  transition: background 0.12s, color 0.12s;
}
.nav-link:hover {
  background: var(--bg-hover);
  color: var(--text);
  text-decoration: none;
}
.nav-link.active {
  background: var(--bg-active);
  color: var(--accent-soft);
}
.nav-icon {
  width: 18px;
  height: 18px;
  opacity: 0.75;
  flex-shrink: 0;
  background: currentColor;
  mask-size: contain;
  mask-repeat: no-repeat;
  mask-position: center;
  -webkit-mask-size: contain;
  -webkit-mask-repeat: no-repeat;
  -webkit-mask-position: center;
}
.nav-link.active .nav-icon { opacity: 1; }
.sidebar-footer {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border-subtle);
  font-size: 12px;
  color: var(--text-faint);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.version-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent-dim);
  color: var(--accent-soft);
  font-weight: 600;
  font-size: 11px;
}

/* Main column */
.main {
  min-width: 0;
  display: flex;
  flex-direction: column;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 30;
  height: var(--header-h);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  background: color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-subtle);
}
.menu-btn {
  display: none;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
}
.menu-btn:hover { background: var(--bg-hover); }
.breadcrumbs {
  flex: 1;
  min-width: 0;
  font-size: 13px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.breadcrumbs strong { color: var(--text); font-weight: 600; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  border: 1px solid var(--border);
  background: var(--bg-elevated);
  color: var(--text-muted);
  transition: background 0.12s, color 0.12s;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--text); }
.content-wrap {
  display: grid;
  grid-template-columns: minmax(0, 1fr) var(--toc-w);
  gap: 32px;
  padding: 28px 36px 80px;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
}
.article {
  min-width: 0;
  max-width: 760px;
}
.article > :first-child { margin-top: 0; }
.page-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.page-badge {
  font-size: 11px;
  font-weight: 650;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--accent-soft);
  background: var(--accent-dim);
  padding: 3px 8px;
  border-radius: 999px;
}

/* Prose */
.article h1 {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.03em;
  line-height: 1.2;
  margin: 0 0 1rem;
  color: var(--text);
}
.article h2 {
  font-size: 1.35rem;
  font-weight: 650;
  letter-spacing: -0.02em;
  margin: 2.4rem 0 0.85rem;
  padding-top: 0.6rem;
  border-top: 1px solid var(--border-subtle);
  scroll-margin-top: calc(var(--header-h) + 16px);
}
.article h3 {
  font-size: 1.1rem;
  font-weight: 650;
  margin: 1.8rem 0 0.65rem;
  scroll-margin-top: calc(var(--header-h) + 16px);
}
.article h4, .article h5, .article h6 {
  font-size: 1rem;
  font-weight: 650;
  margin: 1.4rem 0 0.5rem;
}
.article h2 .anchor,
.article h3 .anchor,
.article h1 .anchor {
  opacity: 0;
  margin-right: 0.35em;
  color: var(--text-faint);
  font-weight: 500;
  text-decoration: none;
}
.article h2:hover .anchor,
.article h3:hover .anchor,
.article h1:hover .anchor { opacity: 1; }
.article p { margin: 0 0 1rem; color: var(--text); }
.article li { margin: 0.25rem 0; }
.article ul, .article ol { margin: 0 0 1rem; padding-left: 1.4rem; }
.article hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2rem 0;
}
.article blockquote {
  margin: 0 0 1rem;
  padding: 0.75rem 1rem;
  border-left: 3px solid var(--accent);
  background: var(--bg-hover);
  border-radius: 0 var(--radius) var(--radius) 0;
  color: var(--text-muted);
}
.article blockquote p { margin: 0; }
.article strong { font-weight: 650; color: var(--text); }
.article code {
  font-family: var(--font-mono);
  font-size: 0.88em;
  background: var(--bg-code);
  border: 1px solid var(--border-subtle);
  padding: 0.12em 0.4em;
  border-radius: 5px;
  color: var(--code-text);
}
.article a { font-weight: 500; }

/* Tables */
.table-wrap {
  overflow-x: auto;
  margin: 0 0 1.25rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elevated);
}
.article table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
}
.article th, .article td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border-subtle);
  vertical-align: top;
}
.article th {
  font-weight: 650;
  background: var(--bg-hover);
  color: var(--text);
  white-space: nowrap;
}
.article tr:last-child td { border-bottom: none; }
.article tbody tr:hover td { background: var(--bg-hover); }

/* Code blocks */
.code-block {
  margin: 0 0 1.25rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-code);
}
.code-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-elevated);
}
.code-lang {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-faint);
}
.copy-btn {
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 5px;
  color: var(--text-muted);
  border: 1px solid transparent;
}
.copy-btn:hover {
  color: var(--text);
  background: var(--bg-hover);
  border-color: var(--border);
}
.copy-btn.copied { color: var(--success); }
.code-block pre {
  margin: 0;
  padding: 14px 16px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.55;
}
.code-block code {
  font-family: inherit;
  font-size: inherit;
  background: none;
  border: none;
  padding: 0;
  color: var(--code-text);
  border-radius: 0;
}

/* TOC */
.toc {
  position: sticky;
  top: calc(var(--header-h) + 20px);
  align-self: start;
  max-height: calc(100vh - var(--header-h) - 40px);
  overflow-y: auto;
  padding-left: 4px;
}
.toc-title {
  font-size: 11px;
  font-weight: 650;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 10px;
}
.toc a {
  display: block;
  font-size: 12.5px;
  color: var(--text-muted);
  padding: 4px 0 4px 12px;
  border-left: 2px solid var(--border);
  text-decoration: none;
  line-height: 1.4;
}
.toc a:hover { color: var(--text); }
.toc a.active {
  color: var(--accent-soft);
  border-left-color: var(--accent);
  font-weight: 550;
}
.toc a.depth-3 { padding-left: 22px; font-size: 12px; }
.toc-empty { display: none; }

/* Pager */
.pager {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 3rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.pager a {
  display: block;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-elevated);
  text-decoration: none;
  color: var(--text);
  transition: border-color 0.12s, background 0.12s;
}
.pager a:hover {
  border-color: var(--accent);
  background: var(--bg-hover);
  text-decoration: none;
}
.pager .label {
  display: block;
  font-size: 11.5px;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.pager .title { font-weight: 600; font-size: 14px; }
.pager .next { text-align: right; }
.pager .disabled { visibility: hidden; }

/* Search modal */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 12vh 16px 16px;
}
.modal-backdrop.open { display: flex; }
.search-modal {
  width: min(560px, 100%);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.search-input-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.search-input-wrap svg { color: var(--text-faint); flex-shrink: 0; }
#search-input {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  color: var(--text);
  font-size: 15px;
}
#search-input::placeholder { color: var(--text-faint); }
.search-results {
  max-height: min(50vh, 360px);
  overflow-y: auto;
  padding: 8px;
}
.search-hit {
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border-radius: 8px;
  color: var(--text);
}
.search-hit:hover, .search-hit.active {
  background: var(--bg-active);
}
.search-hit .hit-page {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--accent-soft);
  margin-bottom: 2px;
}
.search-hit .hit-snippet {
  font-size: 13px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.search-hit mark {
  background: var(--accent-dim);
  color: var(--text);
  border-radius: 2px;
  padding: 0 2px;
}
.search-empty {
  padding: 24px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13.5px;
}
.search-hint {
  padding: 8px 16px 12px;
  font-size: 11.5px;
  color: var(--text-faint);
  border-top: 1px solid var(--border-subtle);
}

/* Mobile overlay */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 35;
}
.sidebar-overlay.open { display: block; }

/* Responsive */
@media (max-width: 1100px) {
  .content-wrap { grid-template-columns: 1fr; }
  .toc { display: none; }
}
@media (max-width: 860px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: min(var(--sidebar-w), 88vw);
    transform: translateX(-105%);
    transition: transform 0.2s ease;
    box-shadow: var(--shadow);
  }
  .sidebar.open { transform: translateX(0); }
  .menu-btn { display: inline-grid; }
  .content-wrap { padding: 20px 18px 64px; }
  .pager { grid-template-columns: 1fr; }
  .pager .next { text-align: left; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  * { transition: none !important; }
}
  </style>

(function () {
  'use strict';

  var PAGES = {"overview":{"id":"overview","title":"Overview","group":"Start","icon":"home","html":"<h1 id=\"baan-c-vscode-documentation\"><a class=\"anchor\" href=\"#baan-c-vscode-documentation\" aria-hidden=\"true\">#</a>Baan C VSCode — Documentation</h1>\n<p>Complete language support for <strong>Baan C</strong> and <strong>Infor LN</strong> (3GL and 4GL) in Visual Studio Code.</p>\n<blockquote><strong>Preferred reading experience:</strong> open the single-file docs site   <a href=\"./index.html\"><code>docs/index.html</code></a> in a browser, or run <strong>Baan C: Open Documentation</strong>   from the Command Palette. Rebuild with <code>npm run docs:build</code> after editing these <code>.md</code> sources.</blockquote>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th></th>\n<th></th>\n</tr></thead><tbody>\n<tr>\n<td><strong>Extension ID</strong></td>\n<td><code>AnonymousGCA.baan-c-vscode</code></td>\n</tr>\n<tr>\n<td><strong>Version</strong></td>\n<td>1.0.6</td>\n</tr>\n<tr>\n<td><strong>License</strong></td>\n<td><a href=\"../LICENSE\">MIT</a></td>\n</tr>\n<tr>\n<td><strong>Marketplace</strong></td>\n<td><a href=\"https://marketplace.visualstudio.com/items?itemName=AnonymousGCA.baan-c-vscode\" target=\"_blank\" rel=\"noopener noreferrer\">Baan C VSCode</a></td>\n</tr>\n<tr>\n<td><strong>Repository</strong></td>\n<td><a href=\"https://github.com/GABRYCA/baan-c-vscode\" target=\"_blank\" rel=\"noopener noreferrer\">GABRYCA/baan-c-vscode</a></td>\n</tr>\n<tr>\n<td><strong>Engine</strong></td>\n<td>VS Code <code>^1.125.0</code></td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"what-you-get\"><a class=\"anchor\" href=\"#what-you-get\" aria-hidden=\"true\">#</a>What you get</h2>\n<ul>\n<li>Syntax highlighting for Baan C / Infor LN (keywords, SQL, 4GL sections, types, preprocessor)</li>\n<li>Document formatting with SQL clause alignment</li>\n<li>Block and naming diagnostics (Hint-level naming, structural errors)</li>\n<li>980+ built-in API completions with hovers and signature help</li>\n<li>Database / ES error constants (<code>ELOCKED</code>, <code>EDUPL</code>, …)</li>\n<li>Go to Definition, Find References, Rename, Outline, folding</li>\n<li>Snippets and insert templates for selects, transactions, 4GL, HTTP, DAL</li>\n<li><strong>Library memory</strong> for BECS temp-file workflows with IntelliJ-style auto-import   (<code>#include</code> vs <code>#pragma used dll</code>)</li>\n</ul>\n<hr />\n<h2 id=\"documentation-map\"><a class=\"anchor\" href=\"#documentation-map\" aria-hidden=\"true\">#</a>Documentation map</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Guide</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><a href=\"#/getting-started\" data-route=\"getting-started\">Getting started</a></td>\n<td>Install, open Baan files, first steps</td>\n</tr>\n<tr>\n<td><a href=\"#/features\" data-route=\"features\">Features</a></td>\n<td>Full feature reference and how each capability works</td>\n</tr>\n<tr>\n<td><a href=\"#/configuration\" data-route=\"configuration\">Configuration</a></td>\n<td>All <code>baanc.*</code> settings with defaults</td>\n</tr>\n<tr>\n<td><a href=\"#/commands\" data-route=\"commands\">Commands</a></td>\n<td>Command Palette actions and editor shortcuts</td>\n</tr>\n<tr>\n<td><a href=\"#/snippets\" data-route=\"snippets\">Snippets</a></td>\n<td>Prefix catalog for control flow, SQL, 4GL, APIs</td>\n</tr>\n<tr>\n<td><a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a></td>\n<td>Memorized libraries, auto-import, BECS workflow</td>\n</tr>\n<tr>\n<td><a href=\"#/development\" data-route=\"development\">Development</a></td>\n<td>Clone, build, debug, package, project layout</td>\n</tr>\n<tr>\n<td><a href=\"#/troubleshooting\" data-route=\"troubleshooting\">Troubleshooting</a></td>\n<td>Known limits, FAQ, and fixes</td>\n</tr>\n</tbody></table></div>\n<p>Release history lives in the root <a href=\"../CHANGELOG.md\" class=\"ext-link\">CHANGELOG.md</a>.</p>\n<hr />\n<h2 id=\"supported-file-types\"><a class=\"anchor\" href=\"#supported-file-types\" aria-hidden=\"true\">#</a>Supported file types</h2>\n<p>The language id is <code>baanc</code>. These extensions activate language support automatically:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Extension</th>\n<th>Typical use</th>\n</tr></thead><tbody>\n<tr>\n<td><code>.bc</code></td>\n<td>Baan C / Infor LN script</td>\n</tr>\n<tr>\n<td><code>.cl</code></td>\n<td>Client / library script</td>\n</tr>\n<tr>\n<td><code>.bcl</code></td>\n<td>Baan C library</td>\n</tr>\n<tr>\n<td><code>.script</code></td>\n<td>Generic script extension</td>\n</tr>\n</tbody></table></div>\n<p>You can also set the language mode manually: <strong>Command Palette → “Change Language Mode” → Baan C</strong>.</p>\n<hr />\n<h2 id=\"quick-links-for-users\"><a class=\"anchor\" href=\"#quick-links-for-users\" aria-hidden=\"true\">#</a>Quick links for users</h2>\n<ol>\n<li>Install <a href=\"#/getting-started#install-visual-studio-code\" data-route=\"getting-started\">Visual Studio Code</a> (path <code>C:\\apps\\VSCODE</code> for LN) and set <strong>Development Parameters = VSCODE</strong> in LN — see <a href=\"#/getting-started\" data-route=\"getting-started\">Getting started</a>.</li>\n<li>Install the extension from the <a href=\"https://marketplace.visualstudio.com/items?itemName=AnonymousGCA.baan-c-vscode\" target=\"_blank\" rel=\"noopener noreferrer\">Marketplace</a> or from a <code>.vsix</code>.</li>\n<li>Open a <code>.bc</code> file — highlighting, completions, and diagnostics start immediately.</li>\n<li>Format with <code>Shift+Alt+F</code> (Windows/Linux) or <code>Shift+Option+F</code> (macOS).</li>\n<li>For BECS workflows, open library/include files once so <strong>Library memory</strong> can learn them — see <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a>.</li>\n</ol>\n<hr />\n<h2 id=\"quick-links-for-contributors\"><a class=\"anchor\" href=\"#quick-links-for-contributors\" aria-hidden=\"true\">#</a>Quick links for contributors</h2>\n<div class=\"code-block\" data-lang=\"bash\"><div class=\"code-head\"><span class=\"code-lang\">bash</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-bash\">npm install\nnpm run compile          # build dist/extension.js\nnpm run watch            # rebuild on change\nnpx @vscode/vsce package # produce .vsix</code></pre></div>\n<p>Details: <a href=\"#/development\" data-route=\"development\">Development</a>.</p>\n<hr />\n<h2 id=\"license\"><a class=\"anchor\" href=\"#license\" aria-hidden=\"true\">#</a>License</h2>\n<p>MIT — see <a href=\"../LICENSE\">LICENSE</a>.</p>","toc":[{"id":"what-you-get","text":"What you get","level":2},{"id":"documentation-map","text":"Documentation map","level":2},{"id":"supported-file-types","text":"Supported file types","level":2},{"id":"quick-links-for-users","text":"Quick links for users","level":2},{"id":"quick-links-for-contributors","text":"Quick links for contributors","level":2},{"id":"license","text":"License","level":2}],"plain":"Baan C VSCode — Documentation\nComplete language support for **Baan C** and **Infor LN** (3GL and 4GL) in Visual Studio Code.\nWhat you get\nSyntax highlighting for Baan C / Infor LN (keywords, SQL, 4GL sections, types, preprocessor)\nDocument formatting with SQL clause alignment\nBlock and naming diagnostics (Hint-level naming, structural errors)\n980+ built-in API completions with hovers and signature help\nDatabase / ES error constants (`ELOCKED`, `EDUPL`, …)\nGo to Definition, Find References, Rename, Outline, folding\nSnippets and insert templates for selects, transactions, 4GL, HTTP, DAL\n**Library memory** for BECS temp-file workflows with IntelliJ-style auto-import  \nDocumentation map\nRelease history lives in the root [CHANGELOG.md](../CHANGELOG.md).\nSupported file types\nThe language id is `baanc`. These extensions activate language support automatically:\nYou can also set the language mode manually: **Command Palette → “Change Language Mode” → Baan C**.\nQuick links for users\nInstall [Visual Studio Code](./getting-started.md#install-visual-studio-code) (path `C:\\apps\\VSCODE` for LN) and set **Development Parameters = VSCODE** in LN — see [Getting started](./getting-started.md).\nInstall the extension from the [Marketplace](https://marketplace.visualstudio.com/items?itemName=AnonymousGCA.baan-c-vscode) or from a `.vsix`.\nOpen a `.bc` file — highlighting, completions, and diagnostics start immediately.\nFormat with `Shift+Alt+F` (Windows/Linux) or `Shift+Option+F` (macOS).\nFor BECS workflows, open library/include files once so **Library memory** can learn them — see [Library memory](./library-memory.md).\nQuick links for contributors\nnpm install\nnpm run compile          # build dist/extension.js\nnpm run watch            # rebuild on change\nnpx @vscode/vsce package # produce .vsix\nDetails: [Development](./development.md).\nLicense\nMIT — see [LICENSE](../LICENSE)."},"getting-started":{"id":"getting-started","title":"Getting started","group":"Start","icon":"rocket","html":"<h1 id=\"getting-started\"><a class=\"anchor\" href=\"#getting-started\" aria-hidden=\"true\">#</a>Getting started</h1>\n<p>This guide covers installing <strong>Visual Studio Code</strong>, connecting it to <strong>Infor LN</strong>, installing <strong>Baan C VSCode</strong>, opening scripts, and the essentials you need on day one.</p>\n<hr />\n<h2 id=\"requirements\"><a class=\"anchor\" href=\"#requirements\" aria-hidden=\"true\">#</a>Requirements</h2>\n<p>Before you use the extension, make sure you have:</p>\n<ul>\n<li><strong>Visual Studio Code</strong> 1.125.0 or newer (see <a href=\"#install-visual-studio-code\">Install Visual Studio Code</a> below)</li>\n<li><strong>Infor LN</strong> user defaults with <strong>Development Parameters</strong> set to <strong>VSCODE</strong> (see <a href=\"#set-vs-code-as-the-default-editor-in-ln\">Set VS Code as the default editor in LN</a>)</li>\n<li>No Infor LN runtime is required for <em>editor</em> features alone (highlighting, format, completions, etc.)</li>\n<li>Optional: access to library/include <code>.bc</code> sources if you want <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a> to learn project APIs</li>\n</ul>\n<hr />\n<h2 id=\"install-visual-studio-code\"><a class=\"anchor\" href=\"#install-visual-studio-code\" aria-hidden=\"true\">#</a>Install Visual Studio Code</h2>\n<p>If VS Code is not on your PC yet, install it first. These steps match the AlteaIn internal guide (custom path used with LN / BECS).</p>\n<ol>\n<li>Download the installer from the official site:   <strong>https://code.visualstudio.com/</strong></li>\n<li>Run the installer and follow the wizard until you reach the <strong>installation path</strong> step.</li>\n<li><strong>Important (company / LN setup):</strong> choose a <strong>custom</strong> install path:</li>\n</ol>\n<p>``<code>text    C:\\apps\\VSCODE    </code>``</p>\n<p>Do <strong>not</strong> leave the default user-profile path if your LN environment expects <code>C:\\apps\\VSCODE</code>.</p>\n<ol>\n<li>Finish the installation.</li>\n<li>Verify the folder exists and contains <strong><code>Code.exe</code></strong> (and the usual VS Code files), for example:</li>\n</ol>\n<p>``<code>text    C:\\apps\\VSCODE\\Code.exe    </code>``</p>\n<ol>\n<li>Start VS Code once (from the Start menu or by running <code>Code.exe</code>) to complete first-run setup.</li>\n</ol>\n<blockquote><strong>Tip:</strong> If your IT department already deploys VS Code to <code>C:\\apps\\VSCODE</code>, skip the installer and open that copy instead.</blockquote>\n<hr />\n<h2 id=\"set-vs-code-as-the-default-editor-in-ln\"><a class=\"anchor\" href=\"#set-vs-code-as-the-default-editor-in-ln\" aria-hidden=\"true\">#</a>Set VS Code as the default editor in LN</h2>\n<p>Infor LN must open sources in VS Code (not the legacy editor). Configure this on <strong>your LN user</strong> via <strong>LNUI</strong>.</p>\n<h3 id=\"select-vscode-in-user-data\"><a class=\"anchor\" href=\"#select-vscode-in-user-data\" aria-hidden=\"true\">#</a>Select VSCODE in User Data</h3>\n<ol>\n<li>Open <strong>LNUI</strong>.</li>\n<li>Go to:   <strong>Tools → User Management → General User Data → User Data</strong> (session).</li>\n<li>Search for <strong>your user</strong> and open it (use the <strong>→</strong> / open button).</li>\n<li>On the top bar, open the <strong>Defaults</strong> tab.</li>\n<li>Find <strong>Development Parameters</strong>.</li>\n<li>Click the <strong>Zoom / lens</strong> icon, select <strong>VSCODE</strong>, then click <strong>OK</strong>.</li>\n<li><strong>Save</strong> the user record.</li>\n</ol>\n<p>You should now have:</p>\n<blockquote>User Data → Defaults → Development Parameters = <strong>VSCODE</strong></blockquote>\n<h3 id=\"if-vscode-is-not-in-the-list\"><a class=\"anchor\" href=\"#if-vscode-is-not-in-the-list\" aria-hidden=\"true\">#</a>If VSCODE is not in the list</h3>\n<p>Create the development-parameter entry first, then select it:</p>\n<ol>\n<li>Still in <strong>User Data</strong>, on the relevant parameters area, click <strong>New</strong>.</li>\n<li>In <strong>Edit</strong>, define the <strong>VSCODE</strong> development parameter so it points at your VS Code install (typically under <code>C:\\apps\\VSCODE</code> / <code>Code.exe</code>, as required by your site).</li>\n<li><strong>Save</strong> the new parameter.</li>\n<li>Return to <strong>Defaults → Development Parameters</strong>, select the new <strong>VSCODE</strong> entry, click <strong>OK</strong>.</li>\n<li><strong>Save</strong> your user again.</li>\n</ol>\n<p>Exact field labels can vary slightly by LN version; if <strong>New</strong> fields are unclear, ask your LN administrator for the site-standard <strong>VSCODE</strong> development-parameter definition.</p>\n<h3 id=\"check-that-ln-opens-vs-code\"><a class=\"anchor\" href=\"#check-that-ln-opens-vs-code\" aria-hidden=\"true\">#</a>Check that LN opens VS Code</h3>\n<ol>\n<li>From LN / BECS, open any script or library for edit.</li>\n<li>The file should open in <strong>Visual Studio Code</strong> (not the old built-in editor).</li>\n<li>If it still opens elsewhere, re-check Development Parameters and that <code>C:\\apps\\VSCODE\\Code.exe</code> exists.</li>\n</ol>\n<hr />\n<h2 id=\"install-the-baan-c-extension-from-the-marketplace\"><a class=\"anchor\" href=\"#install-the-baan-c-extension-from-the-marketplace\" aria-hidden=\"true\">#</a>Install the Baan C extension from the Marketplace</h2>\n<ol>\n<li>Open VS Code.</li>\n<li>Open <strong>Extensions</strong> (<code>Ctrl+Shift+X</code> / <code>Cmd+Shift+X</code>).</li>\n<li>Search for <strong>Baan C VSCode</strong> (publisher: <code>AnonymousGCA</code>).</li>\n<li>Click <strong>Install</strong>.</li>\n</ol>\n<p>Marketplace page:   https://marketplace.visualstudio.com/items?itemName=AnonymousGCA.baan-c-vscode</p>\n<hr />\n<h2 id=\"install-from-a-vsix\"><a class=\"anchor\" href=\"#install-from-a-vsix\" aria-hidden=\"true\">#</a>Install from a VSIX</h2>\n<p>Useful for private builds or offline machines.</p>\n<ol>\n<li>Obtain a <code>.vsix</code> file (from a release, or by packaging — see <a href=\"#/development\" data-route=\"development\">Development</a>).</li>\n<li>Open the Command Palette (<code>Ctrl+Shift+P</code> / <code>Cmd+Shift+P</code>).</li>\n<li>Run <strong>Extensions: Install from VSIX…</strong></li>\n<li>Select the <code>.vsix</code> and confirm <strong>Install</strong>.</li>\n<li>Reload the window if prompted.</li>\n</ol>\n<hr />\n<h2 id=\"open-a-baan-c-file\"><a class=\"anchor\" href=\"#open-a-baan-c-file\" aria-hidden=\"true\">#</a>Open a Baan C file</h2>\n<ol>\n<li>Open any file with extension <code>.bc</code>, <code>.cl</code>, <code>.bcl</code>, or <code>.script</code>.</li>\n<li>The status bar language mode should show <strong>Baan C</strong>.</li>\n<li>If it does not, run <strong>Change Language Mode</strong> and pick <strong>Baan C</strong>.</li>\n</ol>\n<p>The extension activates on <code>onLanguage:baanc</code> — features load when a Baan document is open.</p>\n<hr />\n<h2 id=\"first-day-workflow\"><a class=\"anchor\" href=\"#first-day-workflow\" aria-hidden=\"true\">#</a>First-day workflow</h2>\n<h3 id=\"1.-explore-syntax-and-outline\"><a class=\"anchor\" href=\"#1.-explore-syntax-and-outline\" aria-hidden=\"true\">#</a>1. Explore syntax and Outline</h3>\n<ul>\n<li>Keywords, SQL, 4GL sections, and types are colored automatically.</li>\n<li>Open the <strong>Outline</strong> view (Explorer sidebar) to jump between functions, tables, domains, and 4GL sections.</li>\n</ul>\n<h3 id=\"2.-use-completions\"><a class=\"anchor\" href=\"#2.-use-completions\" aria-hidden=\"true\">#</a>2. Use completions</h3>\n<p>Type part of a name and accept a suggestion (<code>Tab</code> / <code>Enter</code>):</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>You type</th>\n<th>You may get</th>\n</tr></thead><tbody>\n<tr>\n<td><code>db.</code></td>\n<td>Built-in DB API (<code>db.bind</code>, <code>db.update</code>, …)</td>\n</tr>\n<tr>\n<td><code>ELOCK</code></td>\n<td>Error constant <code>ELOCKED</code></td>\n</tr>\n<tr>\n<td><code>select</code></td>\n<td>Snippet or SQL keywords</td>\n</tr>\n<tr>\n<td><code>before.</code></td>\n<td>4GL section names</td>\n</tr>\n<tr>\n<td>Local function names</td>\n<td>Functions declared in the same file</td>\n</tr>\n<tr>\n<td>Memorized library exports</td>\n<td>Functions learned from other opened <code>.bc</code> files</td>\n</tr>\n</tbody></table></div>\n<p>Hover a symbol for documentation. While inside <code>function(</code>, parameter hints appear (or press <code>Ctrl+Shift+Space</code>).</p>\n<h3 id=\"3.-format-the-document\"><a class=\"anchor\" href=\"#3.-format-the-document\" aria-hidden=\"true\">#</a>3. Format the document</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Action</th>\n<th>Shortcut (Windows/Linux)</th>\n<th>Shortcut (macOS)</th>\n</tr></thead><tbody>\n<tr>\n<td>Format Document</td>\n<td><code>Shift+Alt+F</code></td>\n<td><code>Shift+Option+F</code></td>\n</tr>\n<tr>\n<td>Command</td>\n<td><strong>Baan C: Format Document</strong></td>\n<td>same</td>\n</tr>\n</tbody></table></div>\n<p>Optional: enable format on save with <code>baanc.formatOnSave</code> (see <a href=\"#/configuration\" data-route=\"configuration\">Configuration</a>).</p>\n<p>Embedded SQL is indented so clause keywords and operands line up:</p>\n<div class=\"code-block\" data-lang=\"baanc\"><div class=\"code-head\"><span class=\"code-lang\">baanc</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-baanc\">select  tcmcs001.*\nfrom    tcmcs001\nwhere   tcmcs001.compnr = 100\nselectdo\n\t| ...\nendselect</code></pre></div>\n<h3 id=\"4.-insert-a-select-or-transaction-skeleton\"><a class=\"anchor\" href=\"#4.-insert-a-select-or-transaction-skeleton\" aria-hidden=\"true\">#</a>4. Insert a select or transaction skeleton</h3>\n<p>From the Command Palette or the editor context menu (right-click in a Baan file):</p>\n<ul>\n<li><strong>Baan C: Insert Select Template</strong></li>\n<li><strong>Baan C: Insert Transaction + Select Template</strong></li>\n</ul>\n<p>Snippets such as <code>selectf</code> and <code>txselect</code> do the same from the keyboard — see <a href=\"#/snippets\" data-route=\"snippets\">Snippets</a>.</p>\n<h3 id=\"5.-fix-structure-and-naming\"><a class=\"anchor\" href=\"#5.-fix-structure-and-naming\" aria-hidden=\"true\">#</a>5. Fix structure and naming</h3>\n<ul>\n<li>Unmatched <code>endif</code> / <code>endwhile</code> / <code>endselect</code> and similar issues appear as diagnostics.</li>\n<li>Naming convention issues are <strong>Hints</strong> only (not errors). Use <strong>Quick Fix</strong> to rename when suggested.</li>\n<li>Refresh diagnostics with <strong>Baan C: Run Diagnostics</strong> (also opens the <strong>Baan C</strong> output channel).</li>\n</ul>\n<h3 id=\"6.-optional-library-memory-with-becs\"><a class=\"anchor\" href=\"#6.-optional-library-memory-with-becs\" aria-hidden=\"true\">#</a>6. (Optional) Library memory with BECS</h3>\n<p>If you edit via BECS temp files:</p>\n<ol>\n<li>Open the library or include <code>.bc</code> once (so the extension can learn its functions).</li>\n<li>Switch back to your session script.</li>\n<li>Completions offer memorized exports; accepting them can auto-insert:</li>\n</ol>\n<ul>\n<li><code>#include &quot;itxadv0000&quot;</code> for include scripts  </li>\n<li><code>#pragma used dll &quot;otccomdll0200&quot;</code> for DLLs  </li>\n</ul>\n<p>Full details: <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a>.</p>\n<hr />\n<h2 id=\"default-editor-behavior-for-baan-c\"><a class=\"anchor\" href=\"#default-editor-behavior-for-baan-c\" aria-hidden=\"true\">#</a>Default editor behavior for Baan C</h2>\n<p>When the language is <code>baanc</code>, the extension sets sensible defaults (overridable in your settings):</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Default for <code>[baanc]</code></th>\n</tr></thead><tbody>\n<tr>\n<td>Tab size</td>\n<td>4 spaces</td>\n</tr>\n<tr>\n<td>Insert spaces</td>\n<td>yes</td>\n</tr>\n<tr>\n<td>Detect indentation</td>\n<td>off</td>\n</tr>\n<tr>\n<td>Quick suggestions</td>\n<td>on (not in comments/strings)</td>\n</tr>\n<tr>\n<td>Parameter hints</td>\n<td>on</td>\n</tr>\n<tr>\n<td>Folding</td>\n<td>on</td>\n</tr>\n<tr>\n<td>Trim trailing whitespace</td>\n<td>on</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h2 id=\"next-steps\"><a class=\"anchor\" href=\"#next-steps\" aria-hidden=\"true\">#</a>Next steps</h2>\n<ul>\n<li><a href=\"#/features\" data-route=\"features\">Features</a> — complete capability list  </li>\n<li><a href=\"#/configuration\" data-route=\"configuration\">Configuration</a> — tune completions, diagnostics, memory  </li>\n<li><a href=\"#/commands\" data-route=\"commands\">Commands</a> — palette and context menu actions  </li>\n<li><a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a> — BECS / multi-script workflows  </li>\n</ul>","toc":[{"id":"requirements","text":"Requirements","level":2},{"id":"install-visual-studio-code","text":"Install Visual Studio Code","level":2},{"id":"set-vs-code-as-the-default-editor-in-ln","text":"Set VS Code as the default editor in LN","level":2},{"id":"select-vscode-in-user-data","text":"Select VSCODE in User Data","level":3},{"id":"if-vscode-is-not-in-the-list","text":"If VSCODE is not in the list","level":3},{"id":"check-that-ln-opens-vs-code","text":"Check that LN opens VS Code","level":3},{"id":"install-the-baan-c-extension-from-the-marketplace","text":"Install the Baan C extension from the Marketplace","level":2},{"id":"install-from-a-vsix","text":"Install from a VSIX","level":2},{"id":"open-a-baan-c-file","text":"Open a Baan C file","level":2},{"id":"first-day-workflow","text":"First-day workflow","level":2},{"id":"1.-explore-syntax-and-outline","text":"1. Explore syntax and Outline","level":3},{"id":"2.-use-completions","text":"2. Use completions","level":3},{"id":"3.-format-the-document","text":"3. Format the document","level":3},{"id":"4.-insert-a-select-or-transaction-skeleton","text":"4. Insert a select or transaction skeleton","level":3},{"id":"5.-fix-structure-and-naming","text":"5. Fix structure and naming","level":3},{"id":"6.-optional-library-memory-with-becs","text":"6. (Optional) Library memory with BECS","level":3},{"id":"default-editor-behavior-for-baan-c","text":"Default editor behavior for Baan C","level":2},{"id":"next-steps","text":"Next steps","level":2}],"plain":"Getting started\nThis guide covers installing **Visual Studio Code**, connecting it to **Infor LN**, installing **Baan C VSCode**, opening scripts, and the essentials you need on day one.\nRequirements\nBefore you use the extension, make sure you have:\n**Visual Studio Code** 1.125.0 or newer (see [Install Visual Studio Code](#install-visual-studio-code) below)\n**Infor LN** user defaults with **Development Parameters** set to **VSCODE** (see [Set VS Code as the default editor in LN](#set-vs-code-as-the-default-editor-in-ln))\nNo Infor LN runtime is required for *editor* features alone (highlighting, format, completions, etc.)\nOptional: access to library/include `.bc` sources if you want [Library memory](./library-memory.md) to learn project APIs\nInstall Visual Studio Code\nIf VS Code is not on your PC yet, install it first. These steps match the AlteaIn internal guide (custom path used with LN / BECS).\nDownload the installer from the official site:  \nRun the installer and follow the wizard until you reach the **installation path** step.\n**Important (company / LN setup):** choose a **custom** install path:\n```text    C:\\apps\\VSCODE    ```\nDo **not** leave the default user-profile path if your LN environment expects `C:\\apps\\VSCODE`.\nFinish the installation.\nVerify the folder exists and contains **`Code.exe`** (and the usual VS Code files), for example:\n```text    C:\\apps\\VSCODE\\Code.exe    ```\nStart VS Code once (from the Start menu or by running `Code.exe`) to complete first-run setup.\nSet VS Code as the default editor in LN\nInfor LN must open sources in VS Code (not the legacy editor). Configure this on **your LN user** via **LNUI**.\nSelect VSCODE in User Data\nOpen **LNUI**.\nGo to:  \nSearch for **your user** and open it (use the **→** / open button).\nOn the top bar, open the **Defaults** tab.\nFind **Development Parameters**.\nClick the **Zoom / lens** icon, select **VSCODE**, then click **OK**.\n**Save** the user record.\nYou should now have:\nIf VSCODE is not in the list\nCreate the development-parameter entry first, then select it:\nStill in **User Data**, on the relevant parameters area, click **New**.\nIn **Edit**, define the **VSCODE** development parameter so it points at your VS Code install (typically under `C:\\apps\\VSCODE` / `Code.exe`, as required by your site).\n**Save** the new parameter.\nReturn to **Defaults → Development Parameters**, select the new **VSCODE** entry, click **OK**.\n**Save** your user again.\nExact field labels can vary slightly by LN version; if **New** fields are unclear, ask your LN administrator for the site-standard **VSCODE** development-parameter definition.\nCheck that LN opens VS Code\nFrom LN / BECS, open any script or library for edit.\nThe file should open in **Visual Studio Code** (not the old built-in editor).\nIf it still opens elsewhere, re-check Development Parameters and that `C:\\apps\\VSCODE\\Code.exe` exists.\nInstall the Baan C extension from the Marketplace\nOpen VS Code.\nOpen **Extensions** (`Ctrl+Shift+X` / `Cmd+Shift+X`).\nSearch for **Baan C VSCode** (publisher: `AnonymousGCA`).\nClick **Install**.\nMarketplace page:   https://marketplace.visualstudio.com/items?itemName=AnonymousGCA.baan-c-vscode\nInstall from a VSIX\nUseful for private builds or offline machines.\nObtain a `.vsix` file (from a release, or by packaging — see [Development](./development.md)).\nOpen the Command Palette (`Ctrl+Shift+P` / `Cmd+Shift+P`).\nRun **Extensions: Install from VSIX…**\nSelect the `.vsix` and confirm **Install**.\nReload the window if prompted.\nOpen a Baan C file\nOpen any file with extension `.bc`, `.cl`, `.bcl`, or `.script`.\nThe status bar language mode should show **Baan C**.\nIf it does not, run **Change Language Mode** and pick **Baan C**.\nThe extension activates on `onLanguage:baanc` — features load when a Baan document is open.\nFirst-day workflow\n1. Explore syntax and Outline\nKeywords, SQL, 4GL sections, and types are colored automatically.\nOpen the **Outline** view (Explorer sidebar) to jump between functions, tables, domains, and 4GL sections.\n2. Use completions\nType part of a name and accept a suggestion (`Tab` / `Enter`):\nHover a symbol for documentation. While inside `function(`, parameter hints appear (or press `Ctrl+Shift+Space`).\n3. Format the document\nOptional: enable format on save with `baanc.formatOnSave` (see [Configuration](./configuration.md)).\nEmbedded SQL is indented so clause keywords and operands line up:\nselect  tcmcs001.*\nfrom    tcmcs001\nwhere   tcmcs001.compnr = 100\nselectdo\n\t| ...\nendselect\n4. Insert a select or transaction skeleton\nFrom the Command Palette or the editor context menu (right-click in a Baan file):\n**Baan C: Insert Select Template**\n**Baan C: Insert Transaction + Select Template**\nSnippets such as `selectf` and `txselect` do the same from the keyboard — see [Snippets](./snippets.md).\n5. Fix structure and naming\nUnmatched `endif` / `endwhile` / `endselect` and similar issues appear as diagnostics.\nNaming convention issues are **Hints** only (not errors). Use **Quick Fix** to rename when suggested.\nRefresh diagnostics with **Baan C: Run Diagnostics** (also opens the **Baan C** output channel).\n6. (Optional) Library memory with BECS\nIf you edit via BECS temp files:\nOpen the library or include `.bc` once (so the extension can learn its functions).\nSwitch back to your session script.\nCompletions offer memorized exports; accepting them can auto-insert:\n`#include \"itxadv0000\"` for include scripts  \n`#pragma used dll \"otccomdll0200\"` for DLLs  \nFull details: [Library memory](./library-memory.md).\nDefault editor behavior for Baan C\nWhen the language is `baanc`, the extension sets sensible defaults (overridable in your settings):\nNext steps\n[Features](./features.md) — complete capability list  \n[Configuration](./configuration.md) — tune completions, diagnostics, memory  \n[Commands](./commands.md) — palette and context menu actions  \n[Library memory](./library-memory.md) — BECS / multi-script workflows  "},"features":{"id":"features","title":"Features","group":"Guides","icon":"spark","html":"<h1 id=\"features\"><a class=\"anchor\" href=\"#features\" aria-hidden=\"true\">#</a>Features</h1>\n<p>Language support is registered for the <code>baanc</code> language id. Everything below applies to <code>.bc</code>, <code>.cl</code>, <code>.bcl</code>, and <code>.script</code> files (and any file set to language mode <strong>Baan C</strong>).</p>\n<hr />\n<h2 id=\"syntax-highlighting\"><a class=\"anchor\" href=\"#syntax-highlighting\" aria-hidden=\"true\">#</a>Syntax highlighting</h2>\n<p>TextMate grammar: <code>syntaxes/baanc.tmLanguage.json</code> (<code>source.baanc</code>).</p>\n<p>Colored elements include:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Category</th>\n<th>Examples</th>\n</tr></thead><tbody>\n<tr>\n<td>Comments</td>\n<td>`\\</td>\n</tr>\n<tr>\n<td>Preprocessor</td>\n<td><code>#include</code>, <code>#define</code>, <code>#pragma</code>, <code>#ifdef</code>, …</td>\n</tr>\n<tr>\n<td>Strings & numbers</td>\n<td><code>&quot;…&quot;</code>, numeric literals</td>\n</tr>\n<tr>\n<td>Booleans</td>\n<td><code>true</code> / <code>false</code> style tokens where applicable</td>\n</tr>\n<tr>\n<td>Keywords</td>\n<td><code>if</code> / <code>then</code> / <code>endif</code>, <code>while</code>, <code>for</code>, <code>function</code>, SQL verbs, …</td>\n</tr>\n<tr>\n<td>Types</td>\n<td><code>long</code>, <code>double</code>, <code>string</code>, <code>boolean</code>, <code>table</code>, <code>domain</code></td>\n</tr>\n<tr>\n<td>Storage</td>\n<td><code>extern</code>, <code>static</code>, <code>common</code></td>\n</tr>\n<tr>\n<td>4GL sections</td>\n<td><code>declaration:</code>, <code>before.program:</code>, <code>field.…</code>, <code>choice.…</code>, …</td>\n</tr>\n<tr>\n<td>Function definitions & calls</td>\n<td><code>function name(…)</code> and <code>name(…)</code></td>\n</tr>\n<tr>\n<td>Table fields</td>\n<td><code>table.field</code> patterns</td>\n</tr>\n<tr>\n<td>Operators</td>\n<td>arithmetic, comparison, assignment</td>\n</tr>\n</tbody></table></div>\n<p>Primitive type keywords do not incorrectly paint the trailing segment of domain-like names (e.g. <code>txamg.type.long</code>). Markers such as <code>TODO</code> / <code>FIXME</code> in comments stay comment-colored.</p>\n<hr />\n<h2 id=\"language-configuration\"><a class=\"anchor\" href=\"#language-configuration\" aria-hidden=\"true\">#</a>Language configuration</h2>\n<p><code>language-configuration.json</code> provides editor ergonomics:</p>\n<ul>\n<li>Line comment: <code>|</code></li>\n<li>Block comment: <code>/*</code> … <code>*/</code></li>\n<li>Auto-closing brackets, quotes, and block comments</li>\n<li>Indent increase/decrease rules for control blocks and select branches</li>\n<li>On-Enter indent for <code>if</code>/<code>while</code>/<code>for</code>/<code>selectdo</code>/… and stable indent for SQL clause lines</li>\n<li>Word pattern that includes dots and <code>$</code> (Baan identifiers often use both)</li>\n<li>Folding markers for control blocks and 4GL sections</li>\n</ul>\n<hr />\n<h2 id=\"code-formatting\"><a class=\"anchor\" href=\"#code-formatting\" aria-hidden=\"true\">#</a>Code formatting</h2>\n<p><strong>Document formatting provider</strong> + command <strong>Baan C: Format Document</strong>.</p>\n<p>What it does:</p>\n<ul>\n<li>Indents control structures (<code>if</code>/<code>else</code>/<code>elif</code>/<code>endif</code>, loops, <code>on case</code>, functions)</li>\n<li>Indents embedded SQL branches (<code>selectdo</code>, <code>selectempty</code>, <code>selecteos</code>, <code>selecterror</code>)</li>\n<li>Aligns multi-line argument lists</li>\n<li>Aligns embedded SQL clause keywords so operands share a column:</li>\n</ul>\n<p>``<code>baanc   select  table.*   from    table   where   table.field   and     table.other = value   order by table.key   </code>``</p>\n<p>Indent width is controlled by <code>baanc.indentSize</code> (default <code>4</code>).   Optional format-on-save: <code>baanc.formatOnSave</code>.</p>\n<hr />\n<h2 id=\"diagnostics\"><a class=\"anchor\" href=\"#diagnostics\" aria-hidden=\"true\">#</a>Diagnostics</h2>\n<p>Diagnostics run on open/edit (when enabled) and via <strong>Baan C: Run Diagnostics</strong>.</p>\n<h3 id=\"structural-block-matching\"><a class=\"anchor\" href=\"#structural-block-matching\" aria-hidden=\"true\">#</a>Structural / block matching</h3>\n<p><code>baanc.diagnostics.enabled</code> (default <code>true</code>).</p>\n<p>Catches unmatched or mis-nested block keywords, for example:</p>\n<ul>\n<li><code>if</code> / <code>endif</code></li>\n<li><code>while</code> / <code>endwhile</code></li>\n<li><code>for</code> / <code>endfor</code></li>\n<li><code>on case</code> / <code>endcase</code></li>\n<li><code>select</code> / <code>endselect</code></li>\n<li>related branch keywords</li>\n</ul>\n<p>With <code>baanc.diagnostics.strictComments</code> (default <code>true</code>), <code>|</code> and <code>/* */</code> comments are ignored when analyzing structure.</p>\n<h3 id=\"naming-conventions-hint-severity-only\"><a class=\"anchor\" href=\"#naming-conventions-hint-severity-only\" aria-hidden=\"true\">#</a>Naming conventions (Hint severity only)</h3>\n<p><code>baanc.diagnostics.namingConventions</code> (default <code>true</code>).</p>\n<p>Soft suggestions aligned with Infor LN style:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Rule</th>\n<th>Intent</th>\n</tr></thead><tbody>\n<tr>\n<td>Prefer lowercase</td>\n<td>Avoid mixed/upper identifiers where convention expects lower</td>\n</tr>\n<tr>\n<td>Prefer dots as separators</td>\n<td>e.g. <code>my.beautiful.function</code></td>\n</tr>\n<tr>\n<td>Avoid single-letter / <code>temp</code>-style names</td>\n<td>Prefer expressive names</td>\n</tr>\n</tbody></table></div>\n<p><strong>Quick Fix</strong> can rename across the <strong>current file</strong>.   These never report as Errors/Warnings by design.</p>\n<p>Optional argument-prefix hints (<code>i.</code> / <code>o.</code> / <code>io.</code> on function parameters):   <code>baanc.diagnostics.namingArgPrefixes</code> (default <code>false</code> — can be noisy).</p>\n<h3 id=\"import-hints-information\"><a class=\"anchor\" href=\"#import-hints-information\" aria-hidden=\"true\">#</a>Import hints (Information)</h3>\n<p>When <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a> (or conservative builtin DLL mappings) knows a function but the file lacks the matching import:</p>\n<ul>\n<li>Information diagnostic + <strong>Quick Fix</strong> to insert <code>#include &quot;…&quot;</code> or <code>#pragma used dll &quot;…&quot;</code></li>\n</ul>\n<p>Toggles: <code>baanc.libraryMemory.showImportHints</code>, <code>baanc.autoImport.builtinImportHints</code>.</p>\n<hr />\n<h2 id=\"completions\"><a class=\"anchor\" href=\"#completions\" aria-hidden=\"true\">#</a>Completions</h2>\n<p>Completion items can include:</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Source</th>\n<th>Setting</th>\n<th>Notes</th>\n</tr></thead><tbody>\n<tr>\n<td>Built-in APIs (~980+)</td>\n<td><code>baanc.completion.includeBuiltins</code></td>\n<td><code>db.*</code>, <code>dal.*</code>, strings, dates, HTTP, cURL, SOAP, XML/JSON, dialogs, RDI, parallel, …</td>\n</tr>\n<tr>\n<td>Error constants</td>\n<td><code>baanc.completion.includeErrors</code></td>\n<td><code>ELOCKED</code>, <code>EDUPL</code>, <code>ENOREC</code>, …</td>\n</tr>\n<tr>\n<td>SQL keywords</td>\n<td><code>baanc.completion.includeSql</code></td>\n<td>Embedded select / join / where, …</td>\n</tr>\n<tr>\n<td>Preprocessor</td>\n<td><code>baanc.completion.includePreprocessor</code></td>\n<td><code>#include</code>, <code>#define</code>, … (avoids <code>##define</code> duplication)</td>\n</tr>\n<tr>\n<td>4GL section names</td>\n<td><code>baanc.completion.include4gl</code></td>\n<td>Dotted names stay one unit (<code>before.</code> still matches)</td>\n</tr>\n<tr>\n<td>Local functions / tables</td>\n<td>always</td>\n<td>Parsed from the current document</td>\n</tr>\n<tr>\n<td>Memorized library exports</td>\n<td><code>baanc.libraryMemory.enabled</code></td>\n<td>Survives temp-file deletion</td>\n</tr>\n</tbody></table></div>\n<p>Accepting a memorized (or mapped builtin) completion can auto-insert the correct import when enabled — see <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a>.</p>\n<hr />\n<h2 id=\"signature-help\"><a class=\"anchor\" href=\"#signature-help\" aria-hidden=\"true\">#</a>Signature help</h2>\n<p>Parameter hints while typing a call (<code>Ctrl+Shift+Space</code> / <code>Cmd+Shift+Space</code>):</p>\n<ul>\n<li>Built-in functions (from insert/signature metadata)</li>\n<li>Local functions in the current file</li>\n<li>Memorized library function headers when available</li>\n</ul>\n<hr />\n<h2 id=\"hover-documentation\"><a class=\"anchor\" href=\"#hover-documentation\" aria-hidden=\"true\">#</a>Hover documentation</h2>\n<p>Hover shows context for:</p>\n<ul>\n<li>Keywords and language constructs</li>\n<li>Built-in API functions (signature + short doc)</li>\n<li>Error constants (code + meaning)</li>\n<li>Local function definitions</li>\n<li>Memorized library exports (with import kind label)</li>\n</ul>\n<hr />\n<h2 id=\"navigation-and-editing\"><a class=\"anchor\" href=\"#navigation-and-editing\" aria-hidden=\"true\">#</a>Navigation and editing</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Feature</th>\n<th>Shortcut (typical)</th>\n<th>Scope</th>\n</tr></thead><tbody>\n<tr>\n<td><strong>Go to Definition</strong></td>\n<td><code>F12</code></td>\n<td>Functions, tables, domains, typed variables in the <strong>current file</strong></td>\n</tr>\n<tr>\n<td><strong>Find All References</strong></td>\n<td><code>Shift+F12</code></td>\n<td>Identifier uses in the <strong>current file</strong></td>\n</tr>\n<tr>\n<td><strong>Rename Symbol</strong></td>\n<td><code>F2</code></td>\n<td>Rename in the <strong>current file</strong>; guards against renaming builtins/keywords</td>\n</tr>\n<tr>\n<td><strong>Document Highlights</strong></td>\n<td>automatic</td>\n<td>Occurrences of the symbol under the cursor</td>\n</tr>\n<tr>\n<td><strong>Document Symbols (Outline)</strong></td>\n<td>Outline view</td>\n<td>Functions, domains, tables, 4GL sections</td>\n</tr>\n<tr>\n<td><strong>Code Folding</strong></td>\n<td>editor folding</td>\n<td>Control blocks, functions, preprocessor regions, 4GL sections</td>\n</tr>\n</tbody></table></div>\n<blockquote><strong>Note:</strong> References and rename are <strong>single-file</strong>, not a full workspace index. Cross-file discovery for libraries is handled via Library memory completions/imports, not via a global rename index.</blockquote>\n<hr />\n<h2 id=\"snippets-and-templates\"><a class=\"anchor\" href=\"#snippets-and-templates\" aria-hidden=\"true\">#</a>Snippets and templates</h2>\n<h3 id=\"snippets\"><a class=\"anchor\" href=\"#snippets\" aria-hidden=\"true\">#</a>Snippets</h3>\n<p>User snippets in <code>snippets/baanc.json</code> — type a prefix and accept.   Catalog: <a href=\"#/snippets\" data-route=\"snippets\">Snippets</a>.</p>\n<p>Highlights:</p>\n<ul>\n<li>Control flow: <code>if</code>, <code>ife</code>, <code>while</code>, <code>for</code>, <code>oncase</code>, …</li>\n<li>SQL: <code>select</code>, <code>selectf</code>, <code>txselect</code> (aligned <code>table.*</code> style)</li>\n<li>Declarations: <code>domain</code>, <code>table</code>, <code>long</code>, <code>string</code>, …</li>\n<li>Preprocessor: <code>#include</code>, <code>#define</code>, <code>#ifdef</code>, …</li>\n<li>4GL: <code>declaration</code>, <code>before.program</code>, <code>field.</code>, <code>choice.</code>, …</li>\n<li>Patterns: <code>httpget</code>, <code>curlget</code>, <code>dalgs</code>, <code>sqlpf</code>, <code>elocked</code>, …</li>\n</ul>\n<h3 id=\"insert-templates-commands\"><a class=\"anchor\" href=\"#insert-templates-commands\" aria-hidden=\"true\">#</a>Insert templates (commands)</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Command</th>\n<th>Inserts</th>\n</tr></thead><tbody>\n<tr>\n<td><strong>Baan C: Insert Select Template</strong></td>\n<td>Full <code>select</code> / <code>selectdo</code> / <code>selectempty</code> / <code>selecterror</code> / <code>endselect</code> with linked table placeholders</td>\n</tr>\n<tr>\n<td><strong>Baan C: Insert Transaction + Select Template</strong></td>\n<td><code>db.retry.point</code> + <code>for update</code> + update + commit/abort pattern</td>\n</tr>\n</tbody></table></div>\n<p>Also available from the editor <strong>context menu</strong> on Baan files.</p>\n<hr />\n<h2 id=\"library-memory-auto-import\"><a class=\"anchor\" href=\"#library-memory-auto-import\" aria-hidden=\"true\">#</a>Library memory & auto-import</h2>\n<p>Summarized here; full guide: <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a>.</p>\n<ol>\n<li>Opening a library/include <code>.bc</code> extracts exported functions into persistent memory (<code>globalState</code>).</li>\n<li>Those symbols appear in completions elsewhere (even after BECS deletes the temp file).</li>\n<li>On completion accept (optional), the extension inserts:</li>\n</ol>\n<ul>\n<li><strong>Include scripts</strong> → <code>#include &quot;scriptname&quot;</code></li>\n<li><strong>DLLs</strong> → <code>#pragma used dll &quot;o…&quot;</code></li>\n</ul>\n<ol>\n<li>Soft hints + Quick Fix cover calls that already exist without an import.</li>\n<li>Manage via <strong>Baan C: Manage Memorized Libraries…</strong> (inspect, switch kind, remove, clear).</li>\n</ol>\n<p>Builtin auto-import only applies when an API has an <strong>explicit</strong> optional DLL mapping — never guesses package DLLs across LN installations.</p>\n<hr />\n<h2 id=\"output-channel\"><a class=\"anchor\" href=\"#output-channel\" aria-hidden=\"true\">#</a>Output channel</h2>\n<p>Channel name: <strong>Baan C</strong>.</p>\n<p>Used when running <strong>Baan C: Run Diagnostics</strong> (logs that diagnostics were refreshed for the active file). Open via the Output panel dropdown.</p>\n<hr />\n<h2 id=\"feature-checklist-at-a-glance\"><a class=\"anchor\" href=\"#feature-checklist-at-a-glance\" aria-hidden=\"true\">#</a>Feature checklist (at a glance)</h2>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Area</th>\n<th>Supported</th>\n</tr></thead><tbody>\n<tr>\n<td>Highlighting</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Snippets</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Format document / format on save</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Block diagnostics</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Naming hints + Quick Fix rename</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Completions (builtins, SQL, PP, 4GL, local, memory)</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Signature help</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Hover</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Go to Definition</td>\n<td>Yes (file)</td>\n</tr>\n<tr>\n<td>Find References</td>\n<td>Yes (file)</td>\n</tr>\n<tr>\n<td>Rename</td>\n<td>Yes (file)</td>\n</tr>\n<tr>\n<td>Document highlights</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Folding</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Outline / symbols</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Library memory + auto-import</td>\n<td>Yes</td>\n</tr>\n<tr>\n<td>Workspace-wide rename / project index</td>\n<td>No</td>\n</tr>\n<tr>\n<td>Language Server Protocol (external process)</td>\n<td>No (extension-hosted providers)</td>\n</tr>\n</tbody></table></div>","toc":[{"id":"syntax-highlighting","text":"Syntax highlighting","level":2},{"id":"language-configuration","text":"Language configuration","level":2},{"id":"code-formatting","text":"Code formatting","level":2},{"id":"diagnostics","text":"Diagnostics","level":2},{"id":"structural-block-matching","text":"Structural / block matching","level":3},{"id":"naming-conventions-hint-severity-only","text":"Naming conventions (Hint severity only)","level":3},{"id":"import-hints-information","text":"Import hints (Information)","level":3},{"id":"completions","text":"Completions","level":2},{"id":"signature-help","text":"Signature help","level":2},{"id":"hover-documentation","text":"Hover documentation","level":2},{"id":"navigation-and-editing","text":"Navigation and editing","level":2},{"id":"snippets-and-templates","text":"Snippets and templates","level":2},{"id":"snippets","text":"Snippets","level":3},{"id":"insert-templates-commands","text":"Insert templates (commands)","level":3},{"id":"library-memory-auto-import","text":"Library memory & auto-import","level":2},{"id":"output-channel","text":"Output channel","level":2},{"id":"feature-checklist-at-a-glance","text":"Feature checklist (at a glance)","level":2}],"plain":"Features\nLanguage support is registered for the `baanc` language id. Everything below applies to `.bc`, `.cl`, `.bcl`, and `.script` files (and any file set to language mode **Baan C**).\nSyntax highlighting\nTextMate grammar: `syntaxes/baanc.tmLanguage.json` (`source.baanc`).\nColored elements include:\nPrimitive type keywords do not incorrectly paint the trailing segment of domain-like names (e.g. `txamg.type.long`). Markers such as `TODO` / `FIXME` in comments stay comment-colored.\nLanguage configuration\n`language-configuration.json` provides editor ergonomics:\nLine comment: `|`\nBlock comment: `/*` … `*/`\nAuto-closing brackets, quotes, and block comments\nIndent increase/decrease rules for control blocks and select branches\nOn-Enter indent for `if`/`while`/`for`/`selectdo`/… and stable indent for SQL clause lines\nWord pattern that includes dots and `$` (Baan identifiers often use both)\nFolding markers for control blocks and 4GL sections\nCode formatting\n**Document formatting provider** + command **Baan C: Format Document**.\nWhat it does:\nIndents control structures (`if`/`else`/`elif`/`endif`, loops, `on case`, functions)\nIndents embedded SQL branches (`selectdo`, `selectempty`, `selecteos`, `selecterror`)\nAligns multi-line argument lists\nAligns embedded SQL clause keywords so operands share a column:\n```baanc   select  table.*   from    table   where   table.field   and     table.other = value   order by table.key   ```\nIndent width is controlled by `baanc.indentSize` (default `4`).   Optional format-on-save: `baanc.formatOnSave`.\nDiagnostics\nDiagnostics run on open/edit (when enabled) and via **Baan C: Run Diagnostics**.\nStructural / block matching\n`baanc.diagnostics.enabled` (default `true`).\nCatches unmatched or mis-nested block keywords, for example:\n`if` / `endif`\n`while` / `endwhile`\n`for` / `endfor`\n`on case` / `endcase`\n`select` / `endselect`\nrelated branch keywords\nWith `baanc.diagnostics.strictComments` (default `true`), `|` and `/* */` comments are ignored when analyzing structure.\nNaming conventions (Hint severity only)\n`baanc.diagnostics.namingConventions` (default `true`).\nSoft suggestions aligned with Infor LN style:\n**Quick Fix** can rename across the **current file**.   These never report as Errors/Warnings by design.\nOptional argument-prefix hints (`i.` / `o.` / `io.` on function parameters):   `baanc.diagnostics.namingArgPrefixes` (default `false` — can be noisy).\nImport hints (Information)\nWhen [Library memory](./library-memory.md) (or conservative builtin DLL mappings) knows a function but the file lacks the matching import:\nInformation diagnostic + **Quick Fix** to insert `#include \"…\"` or `#pragma used dll \"…\"`\nToggles: `baanc.libraryMemory.showImportHints`, `baanc.autoImport.builtinImportHints`.\nCompletions\nCompletion items can include:\nAccepting a memorized (or mapped builtin) completion can auto-insert the correct import when enabled — see [Library memory](./library-memory.md).\nSignature help\nParameter hints while typing a call (`Ctrl+Shift+Space` / `Cmd+Shift+Space`):\nBuilt-in functions (from insert/signature metadata)\nLocal functions in the current file\nMemorized library function headers when available\nHover documentation\nHover shows context for:\nKeywords and language constructs\nBuilt-in API functions (signature + short doc)\nError constants (code + meaning)\nLocal function definitions\nMemorized library exports (with import kind label)\nNavigation and editing\nSnippets and templates\nSnippets\nUser snippets in `snippets/baanc.json` — type a prefix and accept.   Catalog: [Snippets](./snippets.md).\nHighlights:\nControl flow: `if`, `ife`, `while`, `for`, `oncase`, …\nSQL: `select`, `selectf`, `txselect` (aligned `table.*` style)\nDeclarations: `domain`, `table`, `long`, `string`, …\nPreprocessor: `#include`, `#define`, `#ifdef`, …\n4GL: `declaration`, `before.program`, `field.`, `choice.`, …\nPatterns: `httpget`, `curlget`, `dalgs`, `sqlpf`, `elocked`, …\nInsert templates (commands)\nAlso available from the editor **context menu** on Baan files.\nLibrary memory & auto-import\nSummarized here; full guide: [Library memory](./library-memory.md).\nOpening a library/include `.bc` extracts exported functions into persistent memory (`globalState`).\nThose symbols appear in completions elsewhere (even after BECS deletes the temp file).\nOn completion accept (optional), the extension inserts:\n**Include scripts** → `#include \"scriptname\"`\n**DLLs** → `#pragma used dll \"o…\"`\nSoft hints + Quick Fix cover calls that already exist without an import.\nManage via **Baan C: Manage Memorized Libraries…** (inspect, switch kind, remove, clear).\nBuiltin auto-import only applies when an API has an **explicit** optional DLL mapping — never guesses package DLLs across LN installations.\nOutput channel\nChannel name: **Baan C**.\nUsed when running **Baan C: Run Diagnostics** (logs that diagnostics were refreshed for the active file). Open via the Output panel dropdown.\nFeature checklist (at a glance)"},"configuration":{"id":"configuration","title":"Configuration","group":"Guides","icon":"gear","html":"<h1 id=\"configuration\"><a class=\"anchor\" href=\"#configuration\" aria-hidden=\"true\">#</a>Configuration</h1>\n<p>All settings use the <code>baanc.</code> prefix. Open them via:</p>\n<ul>\n<li><strong>File → Preferences → Settings</strong> and search <code>baanc</code></li>\n<li>Or edit <code>settings.json</code> directly (User or Workspace)</li>\n</ul>\n<p>Settings take effect for open Baan documents when configuration changes (diagnostics are re-run automatically).</p>\n<hr />\n<h2 id=\"settings-reference\"><a class=\"anchor\" href=\"#settings-reference\" aria-hidden=\"true\">#</a>Settings reference</h2>\n<h3 id=\"formatting\"><a class=\"anchor\" href=\"#formatting\" aria-hidden=\"true\">#</a>Formatting</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Type</th>\n<th>Default</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.indentSize</code></td>\n<td>integer (1–16)</td>\n<td><code>4</code></td>\n<td>Spaces per indent level when formatting</td>\n</tr>\n<tr>\n<td><code>baanc.formatOnSave</code></td>\n<td>boolean</td>\n<td><code>false</code></td>\n<td>Format the document automatically on save</td>\n</tr>\n</tbody></table></div>\n<blockquote>Editor tab size for Baan files is also defaulted via <code>configurationDefaults</code> for <code>[baanc]</code> (<code>editor.tabSize</code>: 4). Keep <code>baanc.indentSize</code> and tab size in sync if you customize either.</blockquote>\n<hr />\n<h3 id=\"diagnostics\"><a class=\"anchor\" href=\"#diagnostics\" aria-hidden=\"true\">#</a>Diagnostics</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Type</th>\n<th>Default</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.diagnostics.enabled</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Block-matching and structural diagnostics</td>\n</tr>\n<tr>\n<td><code>baanc.diagnostics.strictComments</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Ignore `\\</td>\n</tr>\n<tr>\n<td><code>baanc.diagnostics.namingConventions</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Hint when identifiers break Infor LN naming style (Hint severity only)</td>\n</tr>\n<tr>\n<td><code>baanc.diagnostics.namingArgPrefixes</code></td>\n<td>boolean</td>\n<td><code>false</code></td>\n<td>Also hint when function args lack <code>i.</code> / <code>o.</code> / <code>io.</code> prefixes</td>\n</tr>\n</tbody></table></div>\n<hr />\n<h3 id=\"completions\"><a class=\"anchor\" href=\"#completions\" aria-hidden=\"true\">#</a>Completions</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Type</th>\n<th>Default</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.completion.includeSql</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>SQL / embedded-select keywords</td>\n</tr>\n<tr>\n<td><code>baanc.completion.includePreprocessor</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Preprocessor directives</td>\n</tr>\n<tr>\n<td><code>baanc.completion.include4gl</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Common 4GL section names</td>\n</tr>\n<tr>\n<td><code>baanc.completion.includeBuiltins</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Built-in Baan C / Infor LN API functions</td>\n</tr>\n<tr>\n<td><code>baanc.completion.includeErrors</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Database / ES error constants (<code>ELOCKED</code>, …)</td>\n</tr>\n</tbody></table></div>\n<p>Local symbols (functions, tables declared in the file) are always candidates for completion when parseable.</p>\n<hr />\n<h3 id=\"library-memory\"><a class=\"anchor\" href=\"#library-memory\" aria-hidden=\"true\">#</a>Library memory</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Type</th>\n<th>Default</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.libraryMemory.enabled</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Remember functions from opened library/include <code>.bc</code> files</td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.maxLibraries</code></td>\n<td>integer (1–200)</td>\n<td><code>40</code></td>\n<td>Max memorized libraries (LRU pruning)</td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.maxFunctionsPerLibrary</code></td>\n<td>integer (10–2000)</td>\n<td><code>200</code></td>\n<td>Cap on functions stored per library</td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.autoImportOnCompletion</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>On accepting a memorized completion, insert <code>#include</code> or <code>#pragma used dll</code> if missing</td>\n</tr>\n<tr>\n<td><code>baanc.libraryMemory.showImportHints</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Information hints + Quick Fix for calls missing the import</td>\n</tr>\n</tbody></table></div>\n<p>Deep dive: <a href=\"#/library-memory\" data-route=\"library-memory\">Library memory</a>.</p>\n<hr />\n<h3 id=\"builtin-auto-import\"><a class=\"anchor\" href=\"#builtin-auto-import\" aria-hidden=\"true\">#</a>Builtin auto-import</h3>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Setting</th>\n<th>Type</th>\n<th>Default</th>\n<th>Description</th>\n</tr></thead><tbody>\n<tr>\n<td><code>baanc.autoImport.builtinsOnCompletion</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>When accepting a <strong>mapped</strong> builtin completion, insert <code>#pragma used dll</code> if missing</td>\n</tr>\n<tr>\n<td><code>baanc.autoImport.builtinImportHints</code></td>\n<td>boolean</td>\n<td><code>true</code></td>\n<td>Soft hints for mapped builtins used without the pragma</td>\n</tr>\n</tbody></table></div>\n<p>Only APIs with an <strong>explicit</strong> optional DLL mapping are considered. Core bshell functions never force a pragma. Package DLLs are not guessed across LN installations.</p>\n<hr />\n<h2 id=\"example-settings.json\"><a class=\"anchor\" href=\"#example-settings.json\" aria-hidden=\"true\">#</a>Example <code>settings.json</code></h2>\n<p>Minimal personalization for a strict naming + always-format workflow:</p>\n<div class=\"code-block\" data-lang=\"json\"><div class=\"code-head\"><span class=\"code-lang\">json</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;baanc.indentSize&quot;: 4,\n  &quot;baanc.formatOnSave&quot;: true,\n  &quot;baanc.diagnostics.enabled&quot;: true,\n  &quot;baanc.diagnostics.namingConventions&quot;: true,\n  &quot;baanc.diagnostics.namingArgPrefixes&quot;: false,\n  &quot;baanc.completion.includeBuiltins&quot;: true,\n  &quot;baanc.completion.includeErrors&quot;: true,\n  &quot;baanc.libraryMemory.enabled&quot;: true,\n  &quot;baanc.libraryMemory.autoImportOnCompletion&quot;: true,\n  &quot;baanc.libraryMemory.showImportHints&quot;: true\n}</code></pre></div>\n<p>Disable library memory entirely (pure single-file editing):</p>\n<div class=\"code-block\" data-lang=\"json\"><div class=\"code-head\"><span class=\"code-lang\">json</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;baanc.libraryMemory.enabled&quot;: false,\n  &quot;baanc.libraryMemory.autoImportOnCompletion&quot;: false,\n  &quot;baanc.libraryMemory.showImportHints&quot;: false\n}</code></pre></div>\n<p>Lighter completions (keywords + local only):</p>\n<div class=\"code-block\" data-lang=\"json\"><div class=\"code-head\"><span class=\"code-lang\">json</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;baanc.completion.includeBuiltins&quot;: false,\n  &quot;baanc.completion.includeErrors&quot;: false,\n  &quot;baanc.completion.includeSql&quot;: true,\n  &quot;baanc.completion.include4gl&quot;: true,\n  &quot;baanc.completion.includePreprocessor&quot;: true\n}</code></pre></div>\n<hr />\n<h2 id=\"language-specific-editor-defaults\"><a class=\"anchor\" href=\"#language-specific-editor-defaults\" aria-hidden=\"true\">#</a>Language-specific editor defaults</h2>\n<p>Contributed under <code>configurationDefaults</code> for <code>[baanc]</code> (user settings override these):</p>\n<div class=\"table-wrap\"><table>\n<thead><tr>\n<th>Key</th>\n<th>Value</th>\n</tr></thead><tbody>\n<tr>\n<td><code>editor.tabSize</code></td>\n<td><code>4</code></td>\n</tr>\n<tr>\n<td><code>editor.insertSpaces</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>editor.detectIndentation</code></td>\n<td><code>false</code></td>\n</tr>\n<tr>\n<td><code>editor.wordBasedSuggestions</code></td>\n<td><code>&quot;allDocuments&quot;</code></td>\n</tr>\n<tr>\n<td><code>editor.suggest.localityBonus</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>editor.suggest.showWords</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>editor.quickSuggestions.other</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>editor.quickSuggestions.comments</code></td>\n<td><code>false</code></td>\n</tr>\n<tr>\n<td><code>editor.quickSuggestions.strings</code></td>\n<td><code>false</code></td>\n</tr>\n<tr>\n<td><code>editor.acceptSuggestionOnEnter</code></td>\n<td><code>&quot;on&quot;</code></td>\n</tr>\n<tr>\n<td><code>editor.suggestSelection</code></td>\n<td><code>&quot;first&quot;</code></td>\n</tr>\n<tr>\n<td><code>editor.parameterHints.enabled</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>editor.folding</code></td>\n<td><code>true</code></td>\n</tr>\n<tr>\n<td><code>files.trimTrailingWhitespace</code></td>\n<td><code>true</code></td>\n</tr>\n</tbody></table></div>\n<p>Example override (2-space indent for Baan only):</p>\n<div class=\"code-block\" data-lang=\"json\"><div class=\"code-head\"><span class=\"code-lang\">json</span><button type=\"button\" class=\"copy-btn\" aria-label=\"Copy code\">Copy</button></div><pre><code class=\"language-json\">{\n  &quot;baanc.indentSize&quot;: 2,\n  &quot;[baanc]&quot;: {\n    &quot;editor.tabSize&quot;: 2\n  }\n}</code></pre></div>\n<hr />\n<h2 id=\"where-memory-is-stored\"><a class=\"anchor\" href=\"#where-memory-is-stored\" aria-hidden=\"true\">#</a>Where memory is stored</h2>\n<p>Library memory uses VS Code <strong>Extension global state</strong> (not workspace files):</p>\n<ul>\n<li>Key: <code>baanc.libraryMemory.v1</code></li>\n<li>Survives reloads and window restarts</li>\n<li>Independent of whether the original temp file still exists</li>\n<li>Cleared via <strong>Baan C: Clear Memorized Libraries</strong> or the manage UI</li>\n</ul>\n<p>Global state is per user profile / machine for that VS Code installation, not committed to git.</p>","toc":[{"id":"settings-reference","text":"Settings reference","level":2},{"id":"formatting","text":"Formatting","level":3},{"id":"diagnostics","text":"Diagnostics","level":3},{"id":"completions","text":"Completions","level":3},{"id":"library-memory","text":"Library memory","level":3},{"id":"builtin-auto-import","text":"Builtin auto-import","level":3},{"id":"example-settings.json","text":"Example settings.json","level":2},{"id":"language-specific-editor-defaults","text":"Language-specific editor defaults","level":2},{"id":"where-memory-is-stored","text":"Where memory is stored","level":2}],"plain":"Configuration\nAll settings use the `baanc.` prefix. Open them via:\n**File → Preferences → Settings** and search `baanc`\nOr edit `settings.json` directly (User or Workspace)\nSettings take effect for open Baan documents when configuration changes (diagnostics are re-run automatically).\nSettings reference\nFormatting\nDiagnostics\nCompletions\nLocal symbols (functions, tables declared in the file) are always candidates for completion when parseable.\nLibrary memory\nDeep dive: [Library memory](./library-memory.md).\nBuiltin auto-import\nOnly APIs with an **explicit** optional DLL mapping are considered. Core bshell functions never force a pragma. Package DLLs are not guessed across LN installations.\nExample `settings.json`\nMinimal personalization for a strict naming + always-format workflow:\n{\n  \"baanc.indentSize\": 4,\n  \"baanc.formatOnSave\": true,\
